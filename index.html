// BEC command words for exam technique
const BEC_COMMAND_WORDS=`
BEC BGCSE Command Words:
- STATE/NAME/LIST/GIVE: Short factual answer only. No explanation needed. 1-2 words or a sentence.
- DEFINE: Give the formal scientific definition. Learn definitions word-for-word.
- DESCRIBE: Give a factual account of what happens. Say WHAT, not WHY.
- EXPLAIN: Give reasons or a mechanism. Say WHY it happens. Use scientific terms.
- CALCULATE: Show ALL working. Include units in your final answer.
- SKETCH: Draw a rough but labelled diagram showing key features.
- SUGGEST: Apply your knowledge to an unfamiliar situation. There may be more than one correct answer.
- DETERMINE: Find a value from a graph, table or by calculation. Show method.
- PREDICT: Use a pattern or principle to say what will happen. Give a reason.
- DISCUSS: Give a balanced account of both sides. Include advantages and disadvantages.
- COMPARE: State similarities AND differences between two things.
Exam tip: The number of marks = the number of points expected. 2 marks = write 2 distinct points.
`;

const HF_TOKEN="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";
const HF_MODEL="mistralai/Mistral-7B-Instruct-v0.3";
async function ask(prompt,system){
  let lastErr=null;
  for(let attempt=0;attempt<=2;attempt++){
    try{
      const r=await fetch(`https://router.huggingface.co/v1/chat/completions`,{
        method:"POST",
        headers:{"Authorization":`Bearer ${HF_TOKEN}`,"Content-Type":"application/json"},
        body:JSON.stringify({
          model:HF_MODEL,
          messages:[
            {role:"system",content:system},
            {role:"user",content:prompt}
          ],
          max_tokens:900,
          temperature:0.7
        })
      });
      if(r.status===503){
        lastErr=new Error("Model loading");
        await new Promise(res=>setTimeout(res,3000));
        continue;
      }
      const d=await r.json();
      if(d.choices?.[0]?.message?.content) return d.choices[0].message.content.trim();
      if(d.error){lastErr=new Error(typeof d.error==="string"?d.error:d.error.message||"AI error");continue;}
      lastErr=new Error("AI error");
    }catch(e){lastErr=e;}
  }
  throw lastErr||new Error("AI error");
}
// ── CACHE (for AI notes — saves API calls on repeat topic views) ─────────────
const CACHE_TTL=7*24*60*60*1000; // 7 days
function cacheKey(kind,s,t){return `cache_${kind}_${s}_${t}`.replace(/\s+/g,"_").slice(0,180);}
function getCached(kind,s,t){
  try{
    const raw=localStorage.getItem(cacheKey(kind,s,t));
    if(!raw) return null;
    const {data,ts}=JSON.parse(raw);
    if(Date.now()-ts>CACHE_TTL){localStorage.removeItem(cacheKey(kind,s,t));return null;}
    return data;
  }catch{return null;}
}
function setCached(kind,s,t,data){
  try{localStorage.setItem(cacheKey(kind,s,t),JSON.stringify({data,ts:Date.now()}));}catch{}
}

const getNotes=async(s,t,forceRefresh)=>{
  if(!forceRefresh){
    const cached=getCached("notes",s,t);
    if(cached) return {...cached,_cached:true};
  }
  const r=await ask(
    `BGCSE Botswana ${s} notes for topic: "${t}". Return raw JSON only, no markdown fences:
{"summary":"2 clear sentences explaining what this topic is about",
"keyPoints":["point 1 — explain clearly","point 2","point 3","point 4","point 5"],
"formula":"key formula or equation for this topic, or null if none",
"rememberThis":"one specific BEC exam technique tip for this topic — mention command words like State/Explain/Calculate as appropriate"}`,
    `You are an expert BGCSE Botswana ${s} teacher (BEC syllabus, effective 2020). Give accurate, syllabus-specific notes. Return raw JSON only. No markdown, no preamble.`
  );
  let parsed=null;
  try{parsed=JSON.parse(r.replace(/```json|```/g,"").trim());}catch{}
  if(parsed) setCached("notes",s,t,parsed);
  return parsed;
};

  const col=days<30?"#ff4444":days<60?"#f59e0b":G;
  return(
    <div style={{background:"#111",border:`1px solid ${col}33`,borderRadius:16,padding:"14px 18px",display:"flex",alignItems:"center",gap:16,marginBottom:16}}>

    </div>
  );
}

// ── EXAM ──────────────────────────────────────────────────────────────────────
function Exam({subject,topic,color,user,onResult}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [shown,setShown]=useState({});
  const [marks,setMarks]=useState({});
  const [score,setScore]=useState(null);

  const load=async()=>{setLoading(true);setData(null);setShown({});setMarks({});setScore(null);try{setData(await getExam(subject,topic))}catch{}setLoading(false)};
  useEffect(()=>{load()},[topic]);

  const mark=(i,m)=>{
    const nm={...marks,[i]:m};setMarks(nm);
    if(data?.parts&&Object.keys(nm).length===data.parts.length){
      const tot=data.parts.reduce((s,p)=>s+p.marks,0);
      const got=Object.values(nm).reduce((a,b)=>a+b,0);
      const pct=Math.round((got/tot)*100);
      setScore({got,tot,pct});
      onResult?.({subject,topic,score:got,total:tot,pct,date:new Date().toISOString(),studentName:user.name});
    }
  };

  const sc=p=>p>=70?G:p>=40?"#f59e0b":"#ff4444";

  if(loading) return <div style={{paddingTop:8}}><Skel h={20} mb={14}/><Skel w="90%" mb={10}/><Skel h={80} mb={10}/><Skel h={80}/></div>;
  if(!data) return <GreenBtn onClick={load}>Retry ↺</GreenBtn>;

  return(
    <div style={{animation:"fadeUp .35s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#333",textTransform:"uppercase"}}>Exam Question</div>
        <div style={{fontSize:11,color,background:`${color}18`,border:`1px solid ${color}33`,borderRadius:100,padding:"3px 10px",fontFamily:"monospace"}}>{data.marks} marks</div>
      </div>

      <div style={{background:"#111",border:`1.5px solid ${color}33`,borderRadius:16,padding:"16px",marginBottom:16}}>
        <div style={{color:"#ddd",fontSize:15,lineHeight:1.75}}>{data.question}</div>
      </div>

      {data.parts?.map((p,i)=>(
        <div key={i} style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:16,padding:"16px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <div style={{flex:1}}><span style={{color,fontWeight:800,fontSize:13}}>{p.part} </span><span style={{color:"#ccc",fontSize:14}}>{p.question}</span></div>
            <span style={{fontSize:11,color:"#333",fontFamily:"monospace",flexShrink:0,marginLeft:8}}>{p.marks}m</span>
          </div>
          {p.commandWord&&(
            <div style={{fontSize:10,color:"#555",marginBottom:8,fontFamily:"monospace"}}>Command word: <span style={{color:"#f0a500"}}>{p.commandWord}</span></div>
          )}
          {!shown[i]?(
            <GreenBtn outline small onClick={()=>setShown(s=>({...s,[i]:true}))}>Show Answer</GreenBtn>
          ):(
            <div style={{animation:"fadeUp .25s ease"}}>
              <div style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:10,padding:"12px",marginBottom:10}}>
                <div style={{fontSize:9,letterSpacing:2,color:"#333",marginBottom:6,textTransform:"uppercase"}}>Working / Key Points</div>
                <div style={{fontFamily:"monospace",fontSize:12,color:"#4a7a5a",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{p.working}</div>
              </div>
              <div style={{background:"rgba(57,255,20,0.05)",border:`1px solid ${G}22`,borderRadius:10,padding:"10px 12px",marginBottom:12}}>
                <div style={{fontSize:9,letterSpacing:2,color:G,marginBottom:4,textTransform:"uppercase"}}>Model Answer</div>
                <div style={{color:"#8aca8a",fontSize:13,lineHeight:1.6}}>{p.answer}</div>
              </div>
              {marks[i]===undefined?(
                <div>
                  <div style={{color:"#444",fontSize:11,marginBottom:8}}>How many marks did you earn?</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {[...Array(p.marks+1)].map((_,m)=>(
                      <button key={m} onClick={()=>mark(i,m)} className="btn" style={{padding:"7px 16px",background:"#151515",border:"1px solid #2a2a2a",borderRadius:8,color:"#777",fontSize:13}}>{m}/{p.marks}</button>
                    ))}
                  </div>
                </div>
              ):(
                <div style={{fontSize:12,color:G,fontFamily:"monospace"}}>✓ {marks[i]}/{p.marks}</div>
              )}
            </div>
          )}
        </div>
      ))}

      {score&&(
        <div style={{background:`${sc(score.pct)}0d`,border:`1.5px solid ${sc(score.pct)}`,borderRadius:16,padding:"18px",marginBottom:14,animation:"fadeUp .3s ease"}}>
          <div style={{fontSize:10,letterSpacing:2,color:sc(score.pct),marginBottom:6,textTransform:"uppercase"}}>Your Score</div>
          <div style={{fontSize:40,fontWeight:900,color:"#fff",lineHeight:1,fontFamily:"monospace"}}>{score.got}/{score.tot}</div>
          <div style={{color:"#555",fontSize:13,marginTop:6}}>{score.pct}% · {score.pct>=70?"Excellent! 🎉":score.pct>=40?"Good effort 📖":"Keep revising 💪"}</div>
        </div>
      )}

      {data.tip&&(
        <div style={{background:"rgba(240,165,0,0.06)",border:"1px solid rgba(240,165,0,0.15)",borderRadius:12,padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:9,letterSpacing:2,color:"#f0a500",marginBottom:4,textTransform:"uppercase"}}>💡 Examiner Tip</div>
          <div style={{color:"#8a7040",fontSize:13}}>{data.tip}</div>
        </div>
      )}

      <GreenBtn onClick={load}>Next Question →</GreenBtn>
    </div>
  );
}

// ── TUTOR ─────────────────────────────────────────────────────────────────────
function Tutor({subject,topic,color,name,initialMsgs,onMsgsChange}){
  const [msgs,setMsgs]=useState(()=>initialMsgs&&initialMsgs.length>0?initialMsgs:[{role:"assistant",content:`Hey ${name}! 👋 Ready to master ${topic}? Ask me anything — I'll help you understand AND how to answer it in the exam!`}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bot=useRef();

  useEffect(()=>{bot.current?.scrollIntoView({behavior:"smooth"})},[msgs,loading]);
  useEffect(()=>{onMsgsChange?.(msgs)},[msgs]);

  const send=async()=>{
    const t=input.trim();
    if(!t||loading) return;
    const nm=[...msgs,{role:"user",content:t}];
    setMsgs(nm);setInput("");setLoading(true);
    try{const r=await chatTutor(nm,subject,topic);setMsgs(m=>[...m,{role:"assistant",content:r}]);}
    catch{setMsgs(m=>[...m,{role:"assistant",content:"Connection error. Try again!"}]);}
    setLoading(false);
  };

  const quick=["Explain simply","Worked example","Common mistakes","How is this examined?","What command words are used?"];
  const exchanges=Math.floor((msgs.length-1)/2);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {exchanges>0&&(
        <div style={{fontSize:10,color:"#444",textAlign:"center",padding:"2px 0 8px",fontFamily:"'JetBrains Mono',monospace"}}>
          🧠 Remembers {exchanges} earlier {exchanges===1?"exchange":"exchanges"} in this conversation
        </div>
      )}
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:10,maxHeight:"48vh"}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",animation:"fadeUp .2s ease"}}>
            <div style={{maxWidth:"82%",background:m.role==="user"?`linear-gradient(135deg,${G},#00cc00)`:"#111",border:m.role==="user"?"none":"1px solid #1e1e1e",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"11px 15px",color:m.role==="user"?"#000":"#ccc",fontSize:14,lineHeight:1.6,fontWeight:m.role==="user"?600:400}}>
              {m.content}
            </div>
          </div>
        ))}
        {loading&&<div style={{paddingLeft:4}}><Dot/></div>}
        <div ref={bot}/>
      </div>

      {msgs.length===1&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10,marginTop:6}}>
          {quick.map(q=>(
            <button key={q} onClick={()=>setInput(`${q}: ${topic}`)} className="btn" style={{padding:"6px 12px",background:"#111",border:`1px solid ${G}22`,borderRadius:100,color:"#666",fontSize:11}}>{q}</button>
          ))}
        </div>
      )}

      <div style={{display:"flex",gap:8,background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:"4px 4px 4px 14px",marginTop:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Ask anything..." style={{flex:1,background:"transparent",border:"none",padding:"10px 0",fontSize:14,color:"#fff",borderRadius:0}}/>
        <button onClick={send} disabled={loading||!input.trim()} className="btn" style={{padding:"10px 16px",background:loading||!input.trim()?"#151515":G,border:"none",borderRadius:10,color:loading||!input.trim()?"#333":"#000",fontWeight:900,fontSize:16}}>↑</button>
      </div>
    </div>
  );
}

// ── STEPS (step-by-step worked example with diagrams) ────────────────────────

  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [visible,setVisible]=useState(0);

  const load=async()=>{setLoading(true);setData(null);setVisible(0);try{setData(await getSteps(subject,topic))}catch{}setLoading(false)};

  if(loading) return <div style={{paddingTop:8}}><Skel h={20} mb={14}/><Skel w="80%" mb={16}/><Skel h={70} mb={10}/><Skel h={70}/></div>;

    <div style={{animation:"fadeUp .35s ease"}}>

      )}

      {isLast&&(
        <button onClick={load} className="btn" style={{padding:"10px",background:"#111",border:"1px solid #222",borderRadius:10,color:"#444",fontSize:12,marginTop:10,width:"100%"}}>New Example ↺</button>

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [name,setName]=useState("");
  const [code,setCode]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const quote=useMemo(()=>QUOTES[Math.floor(Math.random()*QUOTES.length)],[]);

  const go=()=>{
    if(!name.trim()){setErr("Enter your name");return}
    if(!code.trim()){setErr("Enter your access code");return}
    setLoading(true);
    setTimeout(()=>{
      const c=code.trim().toUpperCase();
      if(c===TEACHER_CODE) onLogin({name:name.trim(),role:"teacher",code:c});
      else if(VALID_CODES.includes(c)) onLogin({name:name.trim(),role:"student",code:c});
      else{setErr("Invalid code. Contact your teacher.");setLoading(false);}
    },600);
  };

  return(
    <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:"20%",left:"50%",transform:"translateX(-50%)",width:300,height:300,background:`radial-gradient(circle,${G}08 0%,transparent 70%)`,pointerEvents:"none"}}/>

      <div style={{width:"100%",maxWidth:360,animation:"fadeUp .5s ease",position:"relative"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:42,fontWeight:900,letterSpacing:-2,marginBottom:4}} className="glow-text">
            Edu<span style={{color:G}}>Tee</span>
          </div>
          <div style={{fontSize:12,color:"#333",letterSpacing:3,textTransform:"uppercase"}}>Tech · Botswana 🇧🇼</div>
        </div>

        <div style={{background:"#111",border:`1px solid ${G}18`,borderRadius:14,padding:"14px 16px",marginBottom:24}}>
          <div style={{fontSize:13,fontStyle:"italic",color:"#555",lineHeight:1.6}}>"{quote}"</div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
          <input value={name} onChange={e=>{setName(e.target.value);setErr("")}} placeholder="Your name" style={{background:"#111",border:`1.5px solid ${err&&!name?"#ff4444":"#1e1e1e"}`,borderRadius:12,color:"#fff",padding:"14px 16px",fontSize:14}}/>
          <input value={code} onChange={e=>{setCode(e.target.value);setErr("")}} placeholder="Access code" onKeyDown={e=>e.key==="Enter"&&go()} style={{background:"#111",border:`1.5px solid ${err&&!code?"#ff4444":"#1e1e1e"}`,borderRadius:12,color:G,padding:"14px 16px",fontSize:14,letterSpacing:3,fontFamily:"monospace",fontWeight:700}}/>
        </div>

        {err&&<div style={{color:"#ff4444",fontSize:12,textAlign:"center",marginBottom:12,animation:"fadeUp .2s ease"}}>{err}</div>}

        <GreenBtn full onClick={go} disabled={loading}>
          {loading?"Checking...":"Enter →"}
        </GreenBtn>

        <div style={{textAlign:"center",marginTop:20,color:"#222",fontSize:11,lineHeight:1.8}}>
          BGCSE Botswana · BEC Syllabus 2020<br/>
          No code? Contact your teacher.
        </div>
      </div>
    </div>
  );
}

            <div style={{fontSize:10,letterSpacing:3,color:"#333",marginBottom:12,textTransform:"uppercase"}}>Choose Subject</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
              {SUBJECTS.map((s,i)=>(
                <div key={s.id} className="card btn" onClick={()=>{setSubject(s.id);setScreen("topics");setSearch("")}} style={{background:"#111",border:`1.5px solid ${s.color}22`,borderRadius:16,padding:"18px 14px",cursor:"pointer",animation:`fadeUp .4s ease ${i*.08}s both`,position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:-20,right:-20,fontSize:60,opacity:.05}}>{s.icon}</div>
                  {s.code&&<div style={{fontSize:8,color:s.color,fontFamily:"monospace",marginBottom:4,letterSpacing:1}}>BEC {s.code}</div>}
                  <div style={{fontSize:28,marginBottom:8}}>{s.icon}</div>
                  <div style={{fontWeight:800,fontSize:14,color:"#fff",marginBottom:4,fontFamily:"'Poppins',sans-serif"}}>{s.label}</div>
                  <div style={{fontSize:10,color:s.color,fontFamily:"monospace"}}>{s.topics.length} topics</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {bottomTab==="bookmarks"&&<Bookmarks userCode={user.code} onSelect={(b)=>{setSubject(b.subjectId);setTopic(b.topic);setStudyTab("notes");setScreen("learn");setBottomTab("learn")}}/>}
        {bottomTab==="formulas"&&<FormulaSheet/>}
        {bottomTab==="results"&&<Results user={user}/>}

        {/* TOPICS */}
        {screen==="topics"&&subj&&bottomTab==="learn"&&(
          <div style={{animation:"fadeUp .35s ease"}}>
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:18}}>
              <button onClick={()=>setScreen("home")} className="btn" style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",color:"#555",fontSize:18,flexShrink:0}}>←</button>
              <div>
                <div style={{fontSize:20,fontWeight:900,color:"#fff",fontFamily:"'Poppins',sans-serif"}}>{subj.label}</div>
                <div style={{fontSize:10,color:"#333",fontFamily:"monospace"}}>{subj.code?`BEC ${subj.code} · `:""}{subj.topics.length} topics</div>
              </div>
            </div>
            <div style={{position:"relative",marginBottom:14}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search topics..." style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,color:"#fff",padding:"11px 14px 11px 38px",fontSize:14}}/>
              <div style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#333",fontSize:14}}>⌕</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {filtered?.map((t,i)=>(
                <button key={t} className="tr btn" onClick={()=>{setTopic(t);setStudyTab("notes");setScreen("learn")}} style={{background:"#111",border:"1px solid #161616",borderRadius:11,padding:"13px 14px",textAlign:"left",color:"#aaa",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:"'Segoe UI',sans-serif",animation:`fadeUp .25s ease ${Math.min(i,8)*.03}s both`}}>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:10,color:"#222",minWidth:18,fontFamily:"monospace"}}>{String(i+1).padStart(2,"0")}</span>
                    {t}
                  </div>
                  <span style={{color:subj.color,fontSize:14,flexShrink:0}}>→</span>
                </button>
              ))}
              {filtered?.length===0&&<div style={{textAlign:"center",padding:40,color:"#333",fontSize:12}}>No match for "{search}"</div>}
            </div>
          </div>
        )}

        {/* LEARN */}
        {screen==="learn"&&subj&&topic&&bottomTab==="learn"&&(
          <div style={{animation:"slideRight .35s ease"}}>
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16}}>
              <button onClick={()=>setScreen("topics")} className="btn" style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",color:"#555",fontSize:18,flexShrink:0}}>←</button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:10,color:subj.color,textTransform:"uppercase",letterSpacing:2,marginBottom:2}}>{subj.label}{subj.code?` · BEC ${subj.code}`:""}</div>
                <div style={{fontSize:16,fontWeight:900,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Poppins',sans-serif"}}>{topic}</div>
              </div>
              <button onClick={()=>{toggleBookmark();}} className="btn" style={{background:bookmarked?`${subj.color}18`:"#111",border:`1.5px solid ${bookmarked?subj.color:"#1e1e1e"}`,borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                🔖
              </button>
            </div>

            <div style={{display:"flex",gap:4,marginBottom:18,background:"#111",borderRadius:12,padding:4}}>
              {[["notes","📘 Notes"],["steps","🪜 Steps"],["exam","📝 Exam"],["tutor","🤖 Tutor"]].map(([id,lbl])=>(
                <button key={id} onClick={()=>setStudyTab(id)} className="btn" style={{flex:1,padding:"9px 4px",borderRadius:9,background:studyTab===id?subj.color:"transparent",color:studyTab===id?"#000":"#444",fontSize:12,fontWeight:studyTab===id?800:400,transition:"all .2s",boxShadow:studyTab===id?"0 2px 10px rgba(0,0,0,0.3)":"none"}}>
                  {lbl}
                </button>
              ))}
            </div>

            <div key={studyTab} style={{animation:"tabFade .25s ease"}}>
              {studyTab==="notes"&&<Notes subject={subj.label} topic={topic} color={subj.color}/>}
              {studyTab==="steps"&&<Steps subject={subj.label} topic={topic} color={subj.color}/>}
              {studyTab==="exam"&&<Exam subject={subj.label} topic={topic} color={subj.color} user={user} onResult={saveResult}/>}
              {studyTab==="tutor"&&<Tutor subject={subj.label} topic={topic} color={subj.color} name={user.name.split(" ")[0]} initialMsgs={tutorMemory[tutorKey]} onMsgsChange={(m)=>setTutorMemory(tm=>({...tm,[tutorKey]:m}))}/>}
            </div>
          </div>
        )}
      </main>

      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(10,10,10,0.97)",borderTop:"1px solid #151515",padding:"6px 8px 10px",zIndex:100,backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",maxWidth:680,margin:"0 auto",gap:2}}>
          {[["learn","📚","Study"],["bookmarks","🔖","Saved"],["formulas","📐","Formulas"],["results","📊","Results"]].map(([id,icon,lbl])=>{
            const active=bottomTab===id;
            return(
              <button key={id} onClick={()=>{setBottomTab(id);if(id==="learn"&&!topic)setScreen("home")}} className="btn" style={{flex:1,padding:"8px 2px 5px",background:active?`${G}0d`:"none",border:active?`1px solid ${G}22`:"1px solid transparent",borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:active?G:"#333",transition:"all .2s"}}>
                <span style={{fontSize:18}}>{icon}</span>
                <span style={{fontSize:8,letterSpacing:.5,textTransform:"uppercase",fontFamily:"monospace",fontWeight:active?800:400}}>{lbl}</span>
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
