// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function claude(prompt,system){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[{role:"user",content:prompt}]})
  });
  const d=await r.json();
  return d.content?.map(b=>b.text||"").join("")||"";
}

async function getNotes(subject,topic){
  const raw=await claude(`Write BGCSE Botswana study notes for "${topic}" in ${subject}. Return ONLY valid JSON: {"summary":"2-3 sentences","keyPoints":["p1","p2","p3","p4","p5"],"definitions":[{"term":"word","meaning":"def"}],"formula":"formula or null","rememberThis":"most important exam tip"}`,"You are a BGCSE teacher in Botswana. Align strictly to the Botswana BGCSE syllabus. Return ONLY raw JSON.");
  return JSON.parse(raw.replace(/```json|```/g,"").trim());
}

async function getExam(subject,topic){
  const raw=await claude(`Create a BGCSE Botswana exam question for "${topic}" in ${subject}. Return ONLY valid JSON: {"question":"full question","marks":4,"parts":[{"part":"(a)","question":"sub q","marks":2,"answer":"model answer","working":"step by step"},{"part":"(b)","question":"sub q","marks":2,"answer":"model answer","working":"step by step"}],"examinerNote":"tip"}`,"You are a BGCSE examiner in Botswana. Return ONLY raw JSON.");
  return JSON.parse(raw.replace(/```json|```/g,"").trim());
}

async function tutor(msgs,subject,topic){

}

// ── COUNTDOWN ────────────────────────────────────────────────────────────────
function Countdown({t}){
  const [days,setDays]=useState(0);
  useEffect(()=>{
    const calc=()=>{
      const now=new Date();
      const diff=EXAM_DATE-now;
      setDays(diff>0?Math.ceil(diff/(1000*60*60*24)):0);
    };
    calc();
    const i=setInterval(calc,60000);
    return()=>clearInterval(i);
  },[]);
  const color=days<30?"#ff5c8d":days<60?"#f0a500":"#4ade80";
  return(
    <div style={{background:t.card,border:`1.5px solid ${color}33`,borderRadius:14,padding:"14px 18px",display:"flex",alignItems:"center",gap:16,marginBottom:16}}>
      <div style={{textAlign:"center",minWidth:60}}>

}

        <div style={{fontSize:10,letterSpacing:3,color:t.muted,marginBottom:6,textTransform:"uppercase"}}>Formula Sheet</div>

      </div>

      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
        {SUBJECTS.map(s=>(
          <button key={s.id} onClick={()=>{setActiveSubj(s.label);setSearch("")}} style={{padding:"7px 14px",borderRadius:100,background:activeSubj===s.label?s.color:"transparent",color:activeSubj===s.label?"#fff":t.sub,border:`1.5px solid ${activeSubj===s.label?s.color:t.border}`,fontSize:12,fontWeight:activeSubj===s.label?700:400,whiteSpace:"nowrap",flexShrink:0}}>
            {s.icon} {s.label}

      </div>

      <div style={{position:"relative",marginBottom:14}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search formulas..." style={{background:t.card,border:`1.5px solid ${t.border}`,color:t.text,paddingLeft:38}}/>
        <div style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:t.muted,fontSize:14}}>⌕</div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.map((f,i)=>(
          <div key={i} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:"14px 16px",animation:`fadeIn .3s ease ${i*.03}s both`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>

}

  if(!notes) return <button onClick={load} className="btn-press" style={{padding:"11px 28px",background:color,border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14}}>Retry ↺</button>;

        <div style={{color:t.text,fontSize:14,lineHeight:1.75}}>{notes.summary}</div>

      <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:"16px 18px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:t.muted,marginBottom:12,textTransform:"uppercase"}}>Key Points</div>

          <div key={i} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>

      {notes.formula&&(

          <div style={{fontSize:22,color:t.muted}}>ƒ</div>

            <div style={{fontFamily:"monospace",fontSize:16,color,letterSpacing:.5}}>{notes.formula}</div>

            <div key={i} style={{marginBottom:9,paddingBottom:9,borderBottom:i<notes.definitions.length-1?`1px solid ${t.border}`:"none"}}>

      <div style={{background:"rgba(240,165,0,0.08)",border:"1.5px solid rgba(240,165,0,0.25)",borderRadius:14,padding:"14px 18px"}}>

      <button onClick={load} className="btn-press" style={{padding:"11px",background:t.card,border:`1px solid ${t.border}`,borderRadius:10,color:t.sub,fontSize:13}}>
        Regenerate Notes ↺
      </button>
    </div>
  );
}

// ── EXAM TAB ──────────────────────────────────────────────────────────────────
function Exam({subject,topic,color,user,onResult,t}){
  const [exam,setExam]=useState(null);
  const [loading,setLoading]=useState(true);
  const [revealed,setRevealed]=useState({});
  const [marks,setMarks]=useState({});
  const [score,setScore]=useState(null);

  const load=async()=>{setLoading(true);setExam(null);setRevealed({});setMarks({});setScore(null);try{setExam(await getExam(subject,topic))}catch{}setLoading(false)};
  useEffect(()=>{load()},[topic]);

  const markPart=(i,m)=>{
    const nm={...marks,[i]:m};setMarks(nm);
    if(exam?.parts&&Object.keys(nm).length===exam.parts.length){
      const total=exam.parts.reduce((s,p)=>s+p.marks,0);
      const got=Object.values(nm).reduce((a,b)=>a+b,0);
      const pct=Math.round((got/total)*100);
      setScore({got,total,pct});
      if(onResult) onResult({subject,topic,score:got,total,pct,date:new Date().toISOString(),studentName:user.name});
    }
  };

  const sc=p=>p>=70?"#4ade80":p>=40?"#f0a500":"#ff5c8d";

  if(loading) return <div>{[90,70,80,60,95].map((w,i)=><Skel key={i} w={`${w}%`} h={i===0?20:14} mb={14} t={t}/>)}</div>;
  if(!exam) return <button onClick={load} className="btn-press" style={{padding:"11px 28px",background:color,border:"none",borderRadius:10,color:"#fff",fontWeight:700}}>Retry ↺</button>;

  return(
    <div style={{animation:"fadeIn .35s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <div style={{fontSize:10,letterSpacing:3,color:t.muted,textTransform:"uppercase"}}>Exam Question</div>
        <div style={{fontSize:11,color,background:`${color}18`,border:`1px solid ${color}44`,borderRadius:100,padding:"3px 10px"}}>[{exam.marks} marks]</div>
      </div>
      <div style={{background:`${color}0d`,border:`1.5px solid ${color}30`,borderRadius:14,padding:"16px 18px",marginBottom:18}}>
        <div style={{color:t.text,fontSize:15,lineHeight:1.7}}>{exam.question}</div>
      </div>

      {exam.parts?.map((part,i)=>(
        <div key={i} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:14,padding:"16px 18px",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <div><span style={{color,fontWeight:700,fontSize:13}}>{part.part} </span><span style={{color:t.text,fontSize:14}}>{part.question}</span></div>
            <span style={{fontSize:11,color:t.muted,flexShrink:0,marginLeft:8}}>[{part.marks}m]</span>
          </div>
          {!revealed[i]?(
            <button onClick={()=>setRevealed(r=>({...r,[i]:true}))} className="btn-press" style={{padding:"9px 18px",background:`${color}18`,border:`1px solid ${color}44`,borderRadius:9,color,fontSize:13}}>
              Show Answer & Working
            </button>
          ):(
            <div style={{animation:"fadeIn .3s ease"}}>
              <div style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"12px 14px",marginBottom:10}}>
                <div style={{fontSize:10,letterSpacing:2,color:t.muted,marginBottom:6,textTransform:"uppercase"}}>Step-by-Step Working</div>
                <div style={{fontFamily:"monospace",fontSize:12,color:"#7a9a8a",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{part.working}</div>
              </div>
              <div style={{background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.25)",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
                <div style={{fontSize:10,letterSpacing:2,color:"#4ade80",marginBottom:4,textTransform:"uppercase"}}>Model Answer</div>
                <div style={{color:"#90c090",fontSize:13,lineHeight:1.6}}>{part.answer}</div>
              </div>
              {marks[i]===undefined?(
                <div>
                  <div style={{color:t.muted,fontSize:12,marginBottom:8}}>How many marks did you score?</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {[...Array(part.marks+1)].map((_,m)=>(
                      <button key={m} onClick={()=>markPart(i,m)} className="btn-press" style={{padding:"7px 16px",background:t.card,border:`1px solid ${t.border}`,borderRadius:8,color:t.sub,fontSize:13}}>{m}/{part.marks}</button>
                    ))}
                  </div>
                </div>
              ):(
                <div style={{fontSize:12,color:"#4ade80",fontFamily:"monospace"}}>✓ {marks[i]}/{part.marks} marks</div>
              )}
            </div>
          )}
        </div>
      ))}

      {score&&(
        <div style={{background:`${sc(score.pct)}12`,border:`1.5px solid ${sc(score.pct)}`,borderRadius:14,padding:"18px 20px",marginBottom:16,animation:"pulse .5s ease"}}>
          <div style={{fontSize:10,letterSpacing:2,color:sc(score.pct),marginBottom:6,textTransform:"uppercase"}}>Your Score</div>
          <div style={{fontSize:36,fontWeight:800,color:t.text,marginBottom:4}}>{score.got}/{score.total}</div>
          <div style={{color:t.sub,fontSize:13}}>{score.pct}% · {score.pct>=70?"Excellent! 🎉":score.pct>=40?"Good effort — review the working 📖":"Keep practising — study notes first 💪"}</div>
        </div>
      )}

      {exam.examinerNote&&(
        <div style={{background:"rgba(240,165,0,0.07)",border:"1px solid rgba(240,165,0,0.2)",borderRadius:12,padding:"12px 16px",marginBottom:16}}>
          <div style={{fontSize:10,letterSpacing:2,color:"#f0a500",marginBottom:4,textTransform:"uppercase"}}>💡 Examiner Note</div>
          <div style={{color:"#b09050",fontSize:13,lineHeight:1.6}}>{exam.examinerNote}</div>
        </div>
      )}

      <button onClick={load} className="btn-press" style={{padding:"12px 28px",background:color,border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14}}>Next Question →</button>
    </div>
  );
}

// ── TUTOR TAB ─────────────────────────────────────────────────────────────────
function Tutor({subject,topic,color,name,t}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:`Hi ${name}! 👋 I'm your BGCSE AI tutor for ${subject} — "${topic}". Ask me anything and I'll explain step by step!`}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottom=useRef();

  useEffect(()=>{bottom.current?.scrollIntoView({behavior:"smooth"})},[msgs]);

  const send=async()=>{
    const txt=input.trim();
    if(!txt||loading) return;
    const nm=[...msgs,{role:"user",content:txt}];
    setMsgs(nm);setInput("");setLoading(true);
    try{const r=await tutor(nm,subject,topic);setMsgs(m=>[...m,{role:"assistant",content:r}]);}
    catch{setMsgs(m=>[...m,{role:"assistant",content:"Sorry, connection error. Please try again!"}]);}
    setLoading(false);
  };

  const quick=[`Explain ${topic} simply`,"Give me a worked example","Common exam mistakes?","How is this tested in BGCSE?"];

  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:400}}>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:12,paddingBottom:12,maxHeight:"50vh"}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",animation:"fadeIn .2s ease"}}>
            <div style={{maxWidth:"85%",background:m.role==="user"?`linear-gradient(135deg,${color},${color}cc)`:`${t.card}`,border:m.role==="user"?"none":`1px solid ${t.border}`,borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"12px 16px",color:m.role==="user"?"#fff":t.text,fontSize:14,lineHeight:1.65,boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
              {m.content}
            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",gap:5,padding:"10px 14px",background:t.card,borderRadius:"18px 18px 18px 4px",width:"fit-content",border:`1px solid ${t.border}`}}>
            {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:color,animation:`bounce 1s ${i*.15}s infinite`}}/>)}
          </div>
        )}
        <div ref={bottom}/>
      </div>

      {msgs.length===1&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12,marginTop:8}}>
          {quick.map(p=>(
            <button key={p} onClick={()=>setInput(p)} className="btn-press" style={{padding:"7px 12px",background:t.card,border:`1px solid ${color}33`,borderRadius:100,color:t.sub,fontSize:12}}>
              {p}
            </button>
          ))}
        </div>
      )}

      <div style={{display:"flex",gap:8,background:t.card,border:`1.5px solid ${t.border}`,borderRadius:14,padding:"4px 4px 4px 14px",marginTop:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Ask your tutor anything..." style={{flex:1,background:"transparent",border:"none",padding:"10px 0",fontSize:14,borderRadius:0,color:t.text}}/>
        <button onClick={send} disabled={loading||!input.trim()} className="btn-press" style={{padding:"10px 18px",background:loading||!input.trim()?t.card:color,border:"none",borderRadius:10,color:loading||!input.trim()?t.muted:"#fff",fontWeight:700,fontSize:16}}>↑</button>
      </div>
    </div>
  );
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function Results({user,t}){
  const results=store.get(`r_${user.code}`)||[];
  const overall=results.length>0?Math.round(results.reduce((a,r)=>a+r.pct,0)/results.length):null;
  const sc=p=>p>=70?"#4ade80":p>=40?"#f0a500":"#ff5c8d";

  if(results.length===0) return(
    <div style={{textAlign:"center",padding:"60px 20px",color:t.muted,animation:"fadeIn .4s ease"}}>
      <div style={{fontSize:48,marginBottom:12}}>📊</div>

      <div style={{fontSize:13}}>Complete exam questions to track your progress!</div>

  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14,animation:"fadeIn .3s ease",paddingBottom:60}}>
      <div style={{background:"rgba(59,130,246,0.08)",border:"1.5px solid rgba(59,130,246,0.2)",borderRadius:16,padding:20,textAlign:"center"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#3b82f6",marginBottom:6,textTransform:"uppercase"}}>Overall Average</div>
        <div style={{fontSize:52,fontWeight:800,color:t.text,lineHeight:1}}>{overall}%</div>
        <div style={{color:t.muted,fontSize:13,marginTop:4}}>{results.length} questions answered</div>
      </div>

      {SUBJECTS.map(s=>{
        const sr=results.filter(r=>r.subject===s.label);
        if(sr.length===0) return null;
        const avg=Math.round(sr.reduce((a,r)=>a+r.pct,0)/sr.length);
        return(
          <div key={s.id} style={{background:t.card,border:`1px solid ${s.color}22`,borderRadius:14,padding:"16px 18px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontSize:18}}>{s.icon}</span>
                <span style={{fontWeight:700,color:t.text,fontSize:15}}>{s.label}</span>
              </div>
              <div style={{fontFamily:"monospace",fontSize:15,fontWeight:800,color:sc(avg)}}>{avg}%</div>
            </div>
            <div style={{height:6,background:t.border,borderRadius:3,overflow:"hidden",marginBottom:10}}>
              <div style={{height:"100%",width:`${avg}%`,background:sc(avg),borderRadius:3,transition:"width .8s cubic-bezier(.4,0,.2,1)"}}/>
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {sr.slice(-8).map((r,i)=>(
                <div key={i} title={`${r.topic}: ${r.pct}%`} style={{width:30,height:30,borderRadius:7,background:`${sc(r.pct)}18`,border:`1.5px solid ${sc(r.pct)}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:sc(r.pct),fontFamily:"monospace",fontWeight:700}}>
                  {r.pct}
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── TEACHER DASHBOARD ─────────────────────────────────────────────────────────
function Teacher({onLogout,t,darkMode,setDarkMode}){
  const [tab,setTab]=useState("topics");
  const all=[];
  VALID_CODES.forEach(code=>{
    const r=store.get(`r_${code}`)||[];
    r.forEach(res=>all.push({...res,code}));
  });
  const topicMap={};
  all.forEach(r=>{
    const k=`${r.subject}|||${r.topic}`;
    if(!topicMap[k]) topicMap[k]={subject:r.subject,topic:r.topic,scores:[],attempts:0};
    topicMap[k].scores.push(r.pct);topicMap[k].attempts++;
  });
  const topics=Object.values(topicMap).map(t=>({...t,avg:Math.round(t.scores.reduce((a,b)=>a+b,0)/t.scores.length)})).sort((a,b)=>a.avg-b.avg);
  const struggling=topics.filter(t=>t.avg<60);
  const stuMap={};
  all.forEach(r=>{const n=r.studentName||r.code;if(!stuMap[n]) stuMap[n]={name:n,code:r.code,results:[]};stuMap[n].results.push(r);});
  const students=Object.values(stuMap).map(s=>({...s,avg:Math.round(s.results.reduce((a,r)=>a+r.pct,0)/s.results.length),attempts:s.results.length,weak:[...new Map(s.results.filter(r=>r.pct<50).map(r=>[r.topic,r])).values()]})).sort((a,b)=>a.avg-b.avg);
  const overall=all.length>0?Math.round(all.reduce((a,r)=>a+r.pct,0)/all.length):null;
  const sc=p=>p>=70?"#4ade80":p>=40?"#f0a500":"#ff5c8d";

        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setDarkMode(!darkMode)} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:8,padding:"6px 10px",color:t.sub,fontSize:14}}>{darkMode?"☀️":"🌙"}</button>
          <button onClick={onLogout} style={{background:"none",border:`1px solid ${t.border}`,borderRadius:8,padding:"6px 14px",color:t.sub,fontSize:12}}>Logout</button>
        </div>
      </header>

      <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px 60px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
          {[{l:"Attempts",v:all.length,c:"#3b82f6"},{l:"Class Avg",v:overall!==null?`${overall}%`:"—",c:overall?sc(overall):t.muted},{l:"Students",v:students.length,c:"#a78bfa"}].map(s=>(
            <div key={s.l} style={{background:t.card,border:`1px solid ${s.c}22`,borderRadius:14,padding:"14px 12px"}}>
              <div style={{fontSize:9,letterSpacing:3,color:t.muted,marginBottom:6,textTransform:"uppercase"}}>{s.l}</div>

            <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"9px 4px",border:"none",borderRadius:9,background:tab===id?"#3b82f6":"transparent",color:tab===id?"#fff":t.sub,fontSize:12,fontWeight:tab===id?700:400,transition:"all .2s"}}>

            </div>
            <div style={{background:"rgba(59,130,246,0.05)",border:"1px solid rgba(59,130,246,0.12)",borderRadius:14,padding:"14px 16px"}}>
              <div style={{fontSize:10,letterSpacing:3,color:"#3b82f6",marginBottom:6,textTransform:"uppercase"}}>App Link</div>
              <div style={{fontFamily:"monospace",fontSize:13,color:"#60a5fa"}}>bgcse-study.netlify.app</div>
              <div style={{fontSize:11,color:t.muted,marginTop:4}}>© EduTee Tech Company — Botswana 🇧🇼</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({onLogin,t,darkMode,setDarkMode}){
  const [name,setName]=useState("");
  const [code,setCode]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const quote=QUOTES[Math.floor(Math.random()*QUOTES.length)];

  const go=()=>{
    if(!name.trim()){setErr("Please enter your name");return}
    if(!code.trim()){setErr("Please enter your access code");return}
    setLoading(true);
    setTimeout(()=>{
      const c=code.trim().toUpperCase();
      if(c===TEACHER_CODE) onLogin({name:name.trim(),role:"teacher",code:c});
      else if(VALID_CODES.includes(c)) onLogin({name:name.trim(),role:"student",code:c});
      else{setErr("Invalid code. Contact your teacher.");setLoading(false);}
    },600);
  };

  return(
    <div style={{minHeight:"100vh",background:t.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <button onClick={()=>setDarkMode(!darkMode)} style={{position:"fixed",top:16,right:16,background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"8px 12px",color:t.sub,fontSize:16}}>
        {darkMode?"☀️":"🌙"}
      </button>

      <div style={{width:"100%",maxWidth:380,animation:"fadeIn .5s ease"}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:36,fontWeight:900,letterSpacing:-1,marginBottom:6,color:t.text}}>
            Edu<span style={{color:"#3b82f6"}}>Tee</span><span style={{color:t.muted,fontSize:22,fontWeight:600}}> Tech</span>
          </div>
          <div style={{color:t.muted,fontSize:13,marginBottom:4}}>Botswana BGCSE Study Platform</div>
          <div style={{color:"#1e3a5a",fontSize:11}}>© EduTee Tech Company 🇧🇼</div>
        </div>

        {/* Quote */}
        <div style={{background:`linear-gradient(135deg,rgba(59,130,246,0.08),rgba(167,139,250,0.08))`,border:`1px solid rgba(59,130,246,0.15)`,borderRadius:14,padding:"14px 16px",marginBottom:24}}>
          <div style={{fontStyle:"italic",color:t.text,fontSize:13,lineHeight:1.6,marginBottom:4}}>"{quote.q}"</div>
          <div style={{fontSize:11,color:t.muted}}>— {quote.a}</div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <div style={{fontSize:10,letterSpacing:3,color:t.muted,marginBottom:8,textTransform:"uppercase"}}>Your Name</div>
            <input value={name} onChange={e=>{setName(e.target.value);setErr("")}} placeholder="e.g. Bofelo Mokoena" style={{background:t.card,border:`1.5px solid ${t.border}`,color:t.text}}/>
          </div>
          <div>
            <div style={{fontSize:10,letterSpacing:3,color:t.muted,marginBottom:8,textTransform:"uppercase"}}>Access Code</div>
            <input value={code} onChange={e=>{setCode(e.target.value);setErr("")}} placeholder="Given by your teacher" onKeyDown={e=>e.key==="Enter"&&go()} style={{letterSpacing:3,background:t.card,border:`1.5px solid ${err?"#ff5c8d":t.border}`,color:t.text}}/>
          </div>
          {err&&<div style={{color:"#ff5c8d",fontSize:13,textAlign:"center",animation:"fadeIn .2s ease"}}>{err}</div>}
          <button onClick={go} disabled={loading} className="btn-press" style={{padding:14,background:loading?t.card:"#3b82f6",border:"none",borderRadius:12,color:loading?t.muted:"#fff",fontWeight:800,fontSize:15,marginTop:4,boxShadow:loading?"none":"0 4px 16px rgba(59,130,246,0.4)"}}>
            {loading?"Checking...":"Enter →"}
          </button>
        </div>
        <div style={{textAlign:"center",marginTop:24,color:t.muted,fontSize:12,lineHeight:1.6}}>
          🇧🇼 Aligned to the Botswana BGCSE Syllabus<br/>
          Don't have a code? Contact your teacher.
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [darkMode,setDarkMode]=useState(store.get("darkMode")!==false);
  const [user,setUser]=useState(null);
  const [subject,setSubject]=useState(null);
  const [topic,setTopic]=useState(null);
  const [tab,setTab]=useState("notes");
  const [screen,setScreen]=useState("home");
  const [search,setSearch]=useState("");
  const [bottomTab,setBottomTab]=useState("learn");

  const t=darkMode?DARK:LIGHT;
  const subj=SUBJECTS.find(s=>s.id===subject);

  useEffect(()=>{store.set("darkMode",darkMode)},[darkMode]);
  useEffect(()=>{document.body.style.background=t.bg},[darkMode]);

  const saveResult=(r)=>{
    const k=`r_${user.code}`;
    store.set(k,[...(store.get(k)||[]),{...r,studentName:user.name}]);
  };

  const isBookmarked=()=>{
    if(!topic||!subj) return false;
    const bm=store.get(`bm_${user?.code}`)||[];
    return bm.some(b=>b.topic===topic&&b.subject===subj.label);
  };

  const toggleBookmark=()=>{
    if(!topic||!subj||!user) return;
    const k=`bm_${user.code}`;
    const bm=store.get(k)||[];
    const exists=bm.some(b=>b.topic===topic&&b.subject===subj.label);
    if(exists) store.set(k,bm.filter(b=>!(b.topic===topic&&b.subject===subj.label)));
    else store.set(k,[...bm,{topic,subject:subj.label,subjectId:subj.id}]);
  };

  const handleSelectBookmark=(subjectLabel,topicName,subjectId)=>{
    setSubject(subjectId);setTopic(topicName);setTab("notes");setScreen("learn");setBottomTab("learn");
  };

  if(!user) return <Login onLogin={setUser} t={t} darkMode={darkMode} setDarkMode={setDarkMode}/>;
  if(user.role==="teacher") return <Teacher onLogout={()=>setUser(null)} t={t} darkMode={darkMode} setDarkMode={setDarkMode}/>;

  const filteredTopics=subj?.topics.filter(tt=>tt.toLowerCase().includes(search.toLowerCase()));
  const bookmarked=isBookmarked();

  return(
    <div style={{minHeight:"100vh",background:t.bg,display:"flex",flexDirection:"column",color:t.text}}>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}@keyframes bounce{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-5px);opacity:1}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}.tr{transition:all .18s}.tr:hover{opacity:.85}.card-hover{transition:all .22s cubic-bezier(.4,0,.2,1)}.card-hover:hover{transform:translateY(-3px)}.btn-press:active{transform:scale(.96)}`}</style>

      <header style={{padding:"0 16px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${t.border}`,background:t.header,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)"}}>
        <div style={{fontWeight:900,fontSize:16,cursor:"pointer",color:t.text}} onClick={()=>{setScreen("home");setSubject(null);setTopic(null);setBottomTab("learn")}}>
          Edu<span style={{color:"#3b82f6"}}>Tee</span><span style={{color:t.muted,fontSize:12,fontWeight:500}}> Tech</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setDarkMode(!darkMode)} className="btn-press" style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:8,padding:"6px 10px",color:t.sub,fontSize:14}}>{darkMode?"☀️":"🌙"}</button>
          <button onClick={()=>setUser(null)} className="btn-press" style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:8,padding:"5px 12px",color:t.sub,fontSize:12}}>
            {user.name.split(" ")[0]}
          </button>
        </div>
      </header>

      <main style={{flex:1,maxWidth:680,width:"100%",margin:"0 auto",padding:"20px 16px 90px",overflowY:"auto"}}>

        {/* HOME */}
        {screen==="home"&&bottomTab==="learn"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <Countdown t={t}/>
            <Quote t={t}/>
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,letterSpacing:4,color:t.muted,marginBottom:8,textTransform:"uppercase"}}>Welcome back</div>
              <div style={{fontSize:26,fontWeight:800,color:t.text,marginBottom:4}}>{user.name} 👋</div>
              <div style={{color:t.sub,fontSize:13}}>🇧🇼 BGCSE Syllabus — Choose a subject to study</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
              {SUBJECTS.map((s,i)=>(
                <div key={s.id} className="card-hover btn-press" onClick={()=>{setSubject(s.id);setScreen("topics");setSearch("")}} style={{background:`linear-gradient(135deg,${s.color}18,${t.card})`,border:`1.5px solid ${s.color}33`,borderRadius:16,padding:"20px 16px",cursor:"pointer",animation:`fadeIn .4s ease ${i*.08}s both`}}>
                  <div style={{fontSize:26,marginBottom:10}}>{s.icon}</div>
                  <div style={{fontWeight:800,fontSize:15,color:t.text,marginBottom:4}}>{s.label}</div>
                  <div style={{fontSize:10,color:s.color,fontFamily:"monospace"}}>{s.topics.length} topics</div>
                </div>
              ))}
            </div>
            <div style={{background:`linear-gradient(135deg,rgba(59,130,246,0.06),rgba(167,139,250,0.06))`,border:`1px solid rgba(59,130,246,0.15)`,borderRadius:14,padding:"14px 16px"}}>
              <div style={{fontSize:10,letterSpacing:3,color:"#3b82f6",marginBottom:8,textTransform:"uppercase"}}>How to use EduTee Tech</div>
              {["1. Pick a subject","2. Choose a BGCSE topic","3. Read AI study notes","4. Attempt exam questions","5. Chat with your AI tutor"].map(s=>(
                <div key={s} style={{color:t.sub,fontSize:13,marginBottom:4}}>{s}</div>
              ))}
            </div>
          </div>
        )}

        {/* BOOKMARKS */}
        {bottomTab==="bookmarks"&&<BookmarksView t={t} onSelectTopic={handleSelectBookmark} userCode={user.code}/>}

        {/* RESULTS */}
        {bottomTab==="results"&&<Results user={user} t={t}/>}

        {/* FORMULA SHEET */}
        {bottomTab==="formulas"&&<FormulaSheet t={t}/>}

        {/* TOPICS */}
        {screen==="topics"&&subj&&bottomTab==="learn"&&(
          <div style={{animation:"fadeIn .35s ease"}}>
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:20}}>
              <button onClick={()=>setScreen("home")} className="btn-press" style={{background:"none",border:"none",color:t.muted,fontSize:22,padding:4}}>←</button>
              <div>
                <div style={{fontSize:22,fontWeight:800,color:t.text}}>{subj.label}</div>
                <div style={{fontSize:10,color:t.muted,fontFamily:"monospace"}}>{subj.topics.length} BGCSE topics</div>
              </div>
            </div>
            <div style={{position:"relative",marginBottom:14}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search topics..." style={{background:t.card,border:`1.5px solid ${t.border}`,color:t.text,paddingLeft:38}}/>
              <div style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:t.muted,fontSize:14}}>⌕</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {filteredTopics?.map((tt,i)=>(
                <button key={tt} className="tr btn-press" onClick={()=>{setTopic(tt);setTab("notes");setScreen("learn")}} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:11,padding:"13px 16px",textAlign:"left",color:t.text,fontSize:14,display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:"'Segoe UI',sans-serif",animation:`fadeIn .3s ease ${Math.min(i,6)*.04}s both`}}>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:10,color:t.muted,minWidth:20,fontFamily:"monospace"}}>{String(i+1).padStart(2,"0")}</span>
                    {tt}
                  </div>
                  <span style={{color:subj.color,fontSize:16}}>→</span>
                </button>
              ))}
              {filteredTopics?.length===0&&<div style={{textAlign:"center",padding:40,color:t.muted,fontSize:12}}>No topics match "{search}"</div>}
            </div>
          </div>
        )}

        {/* LEARN */}
        {screen==="learn"&&subj&&topic&&bottomTab==="learn"&&(
          <div style={{animation:"slideIn .35s ease"}}>
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16}}>
              <button onClick={()=>setScreen("topics")} className="btn-press" style={{background:"none",border:"none",color:t.muted,fontSize:22,padding:4}}>←</button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:10,color:subj.color,textTransform:"uppercase",letterSpacing:2,marginBottom:2}}>{subj.label}</div>
                <div style={{fontSize:17,fontWeight:800,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{topic}</div>
              </div>
              <button onClick={toggleBookmark} className="btn-press" style={{background:bookmarked?`${subj.color}18`:"transparent",border:`1.5px solid ${bookmarked?subj.color:t.border}`,borderRadius:10,padding:"7px 12px",color:bookmarked?subj.color:t.muted,fontSize:16,flexShrink:0}}>
                {bookmarked?"🔖":"🔖"}
              </button>
            </div>

            <div style={{display:"flex",gap:4,marginBottom:20,background:t.card,borderRadius:12,padding:4}}>
              {[["notes","📘 Notes"],["exam","📝 Exam Q"],["tutor","🤖 Tutor"]].map(([id,lbl])=>(
                <button key={id} onClick={()=>setTab(id)} className="btn-press" style={{flex:1,padding:"9px 4px",border:"none",borderRadius:9,background:tab===id?subj.color:"transparent",color:tab===id?"#fff":t.sub,fontSize:12,fontWeight:tab===id?800:400,transition:"all .2s",boxShadow:tab===id?"0 2px 8px rgba(0,0,0,0.2)":"none"}}>
                  {lbl}
                </button>
              ))}
            </div>

            {tab==="notes"&&<Notes subject={subj.label} topic={topic} color={subj.color} t={t}/>}
            {tab==="exam"&&<Exam subject={subj.label} topic={topic} color={subj.color} user={user} onResult={saveResult} t={t}/>}
            {tab==="tutor"&&<Tutor subject={subj.label} topic={topic} color={subj.color} name={user.name.split(" ")[0]} t={t}/>}
          </div>
        )}
      </main>

      {/* BOTTOM NAV */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:t.header,borderTop:`1px solid ${t.border}`,padding:"6px 8px 10px",zIndex:100,backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",maxWidth:680,margin:"0 auto",gap:2}}>
          {[["learn","📚","Study"],["bookmarks","🔖","Saved"],["formulas","📐","Formulas"],["results","📊","Results"]].map(([id,icon,lbl])=>(
            <button key={id} onClick={()=>{setBottomTab(id);if(id==="learn"&&!topic)setScreen("home")}} className="btn-press" style={{flex:1,padding:"8px 2px 5px",background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:bottomTab===id?subj?.color||"#3b82f6":t.muted,transition:"color .2s"}}>
              <span style={{fontSize:18}}>{icon}</span>
              <span style={{fontSize:8,letterSpacing:.5,textTransform:"uppercase",fontFamily:"monospace"}}>{lbl}</span>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
