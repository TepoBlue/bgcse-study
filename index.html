// ── MATH RENDERER ─────────────────────────────────────────────────────────────
function MathRender({tex,display=false,color}){
  const ref=useRef();
  useEffect(()=>{
    if(ref.current&&window.katex){
      try{
        window.katex.render(tex,ref.current,{
          displayMode:display,
          throwOnError:false,
          errorColor:"#ff4444",
          macros:{"\\half":"\\frac{1}{2}"},
        });
        if(color) ref.current.style.color=color;
      }catch(e){
        ref.current.innerText=tex;
      }
    }
  },[tex,display,color]);
  return <span ref={ref} style={{color:color||"inherit"}}/>;
}

// Renders text that may contain $...$ inline math and $$...$$ display math
function MathText({text,color}){
  if(!text) return null;
  // Split by $$...$$ first (display), then $...$ (inline)
  const parts=[];
  let remaining=text;
  let key=0;

  // Process display math $$...$$
  const displayRegex=/\$\$([^$]+)\$\$/g;
  const segments=remaining.split(displayRegex);

  segments.forEach((seg,i)=>{
    if(i%2===1){
      // This is display math
      parts.push(<div key={key++} style={{margin:"8px 0"}}><MathRender tex={seg} display={true} color={color}/></div>);
    } else {
      // Process inline math $...$
      const inlineParts=seg.split(/\$([^$]+)\$/g);
      inlineParts.forEach((p,j)=>{
        if(j%2===1){
          parts.push(<MathRender key={key++} tex={p} color={color}/>);
        } else if(p){
          parts.push(<span key={key++} style={{color:color||"inherit"}}>{p}</span>);
        }
      });
    }
  });

  return <>{parts}</>;
}

// Step-by-step working renderer
function WorkingSteps({working}){
  if(!working) return null;
  // Split by newlines into steps
  const lines=working.split("\n").filter(l=>l.trim());
  return(
    <div style={{display:"flex",flexDirection:"column",gap:0}}>
      {lines.map((line,i)=>{
        const isResult=line.includes("=")&&i>0;
        return(
          <div key={i} className="math-step" style={{borderLeftColor:i===lines.length-1?"#39ff14":"#1e3a1e"}}>
            <div className="math-step-num">Step {i+1}</div>
            <div style={{fontSize:15}}>
              <MathText text={line} color={i===lines.length-1?"#39ff14":"#8aca8a"}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function WorksheetSolver(){
  const [problem,setProblem]=useState("");
  const [solution,setSolution]=useState(null);
  const [loading,setLoading]=useState(false);
  const [history,setHistory]=useState([]);

  const solve=async()=>{
    if(!problem.trim()||loading) return;
    setLoading(true);setSolution(null);
    try{
      const raw=await ask(
        `Solve this BGCSE maths problem step by step like a student writing on paper: "${problem}". Return ONLY valid JSON: {"problem":"restate the problem","steps":[{"num":1,"action":"what you do","working":"the actual calculation","result":"what you get"}],"answer":"final answer with units","method":"method used","check":"how to verify"}`,
        "You are a BGCSE Maths teacher in Botswana. Show working like a student writes on paper. Clear steps. Return ONLY raw JSON."
      );
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setSolution(parsed);
      setHistory(h=>[{problem,solution:parsed},...h.slice(0,4)]);
    }catch{setSolution({error:true});}
    setLoading(false);
  };

  return(
    <div style={{animation:"fadeUp .4s ease"}}>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:900,color:"#fff",marginBottom:4}}>Worksheet Solver 🧮</div>
        <div style={{fontSize:12,color:"#444"}}>Type any maths problem — see full paper working</div>

          {loading?"Solving...":"Solve It →"}
        </button>
      </div>
      {loading&&<div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:16,padding:"20px",textAlign:"center"}}><Dot/><div style={{color:"#444",fontSize:12,marginTop:8}}>Working it out...</div></div>}

        <div style={{animation:"fadeUp .4s ease"}}>

                  <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
                    <div style={{width:22,height:22,borderRadius:6,background:`${G}20`,border:`1px solid ${G}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:G,fontWeight:900,flexShrink:0}}>{step.num}</div>
                    <div style={{fontSize:12,color:"#666",paddingTop:2,fontStyle:"italic"}}>{step.action}</div>
                  </div>
                  <div style={{marginLeft:32,background:"rgba(57,255,20,0.03)",borderLeft:`2px solid ${G}33`,paddingLeft:14,paddingTop:8,paddingBottom:8,borderRadius:"0 8px 8px 0"}}>

                    {step.result&&(
                      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                        <div style={{height:1,flex:1,background:`${G}22`}}/>
                        <div style={{fontSize:13,color:G,fontFamily:"'Georgia',serif",fontWeight:700}}>{step.result}</div>
                      </div>
                    )}
                  </div>
                </div>
              ))}
              <div style={{background:`${G}10`,border:`2px solid ${G}`,borderRadius:12,padding:"14px 18px",marginTop:8}}>
                <div style={{fontSize:10,letterSpacing:3,color:G,marginBottom:6,textTransform:"uppercase"}}>Final Answer</div>

              </div>
              {solution.check&&(
                <div style={{background:"rgba(240,165,0,0.06)",border:"1px solid rgba(240,165,0,0.15)",borderRadius:10,padding:"10px 14px",marginTop:10}}>

                </div>
              )}
            </div>
          </div>

    </div>
  );
}

function Notes({subject,topic,color}){

  useEffect(()=>{load()},[topic]);

  if(loading) return <div style={{paddingTop:8}}><Skel h={20} mb={14}/><Skel w="85%" mb={10}/><Skel w="70%" mb={20}/><Skel h={60} mb={10}/><Skel h={60} mb={10}/><Skel h={60}/></div>;
  if(!data) return <GreenBtn onClick={load}>Retry ↺</GreenBtn>;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12,animation:"fadeUp .35s ease"}}>
      {/* Summary */}
      <div style={{background:"#111",border:`1.5px solid ${color}33`,borderRadius:16,padding:"16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>

        </div>
        <div style={{color:"#ccc",fontSize:14,lineHeight:1.75}}>{data.summary}</div>
      </div>

      {/* Key Points */}
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:16,padding:"16px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#444",marginBottom:12,textTransform:"uppercase"}}>Key Points</div>
        {data.keyPoints?.map((p,i)=>(
          <div key={i} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
            <div style={{width:22,height:22,borderRadius:7,background:`${color}18`,border:`1.5px solid ${color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color,flexShrink:0,fontWeight:900}}>{i+1}</div>
            <div style={{color:"#bbb",fontSize:14,lineHeight:1.65,paddingTop:2}}>{p}</div>
          </div>
        ))}
      </div>

      {/* Formula */}
      {data.formula&&(
        <div style={{background:"#111",border:`1px solid ${G}22`,borderRadius:16,padding:"16px"}}>
          <div style={{fontSize:10,letterSpacing:3,color:"#444",marginBottom:10,textTransform:"uppercase"}}>Formula</div>
          <div style={{fontSize:18,color:color,fontFamily:"'Georgia',serif",letterSpacing:.5}}>{data.formula}</div>
        </div>

      <div style={{background:"linear-gradient(135deg,rgba(240,165,0,0.08),rgba(240,165,0,0.04))",border:"1px solid rgba(240,165,0,0.2)",borderRadius:16,padding:"14px 16px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#f0a500",marginBottom:6,textTransform:"uppercase"}}>⭐ Remember</div>
        <div style={{color:"#c0a060",fontSize:13,lineHeight:1.65}}>{data.rememberThis}</div>

    </div>
  );
}

  const [shown,setShown]=useState({});
  const [marks,setMarks]=useState({});
  const [score,setScore]=useState(null);

  const load=async()=>{setLoading(true);setData(null);setShown({});setMarks({});setScore(null);try{setData(await getExam(subject,topic))}catch{}setLoading(false)};
  useEffect(()=>{load()},[topic]);

  const mark=(i,m)=>{
    const nm={...marks,[i]:m};setMarks(nm);
    if(data?.parts&&Object.keys(nm).length===data.parts.length){
      const tot=data.parts.reduce((s,p)=>s+p.marks,0);
      const got=Object.values(nm).reduce((a,b)=>a+b,0);
      const pct=Math.round((got/tot)*100);
      setScore({got,tot,pct});
      onResult?.({subject,topic,score:got,total:tot,pct,date:new Date().toISOString(),studentName:user.name});
    }
  };

  const sc=p=>p>=70?G:p>=40?"#f59e0b":"#ff4444";

  if(loading) return <div style={{paddingTop:8}}><Skel h={20} mb={14}/><Skel w="90%" mb={10}/><Skel h={80} mb={10}/><Skel h={80}/></div>;
  if(!data) return <GreenBtn onClick={load}>Retry ↺</GreenBtn>;

  return(
    <div style={{animation:"fadeUp .35s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#333",textTransform:"uppercase"}}>Question</div>
        <div style={{fontSize:11,color,background:`${color}18`,border:`1px solid ${color}33`,borderRadius:100,padding:"3px 10px",fontFamily:"monospace"}}>{data.marks} marks</div>
      </div>

      <div style={{background:"#111",border:`1.5px solid ${color}33`,borderRadius:16,padding:"16px",marginBottom:16}}>
        <div style={{color:"#ddd",fontSize:15,lineHeight:1.75}}>{data.question}</div>
      </div>

      {data.parts?.map((p,i)=>(
        <div key={i} style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:16,padding:"16px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <div><span style={{color,fontWeight:800,fontSize:13}}>{p.part} </span><span style={{color:"#ccc",fontSize:14}}>{p.question}</span></div>
            <span style={{fontSize:11,color:"#333",fontFamily:"monospace",flexShrink:0,marginLeft:8}}>{p.marks}m</span>
          </div>
          {!shown[i]?(
            <GreenBtn outline small onClick={()=>setShown(s=>({...s,[i]:true}))}>Show Answer</GreenBtn>
          ):(
            <div style={{animation:"fadeUp .25s ease"}}>
              <div style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:10,padding:"12px",marginBottom:10}}>
                <div style={{fontSize:9,letterSpacing:2,color:"#333",marginBottom:8,textTransform:"uppercase"}}>Step-by-Step Working</div>
                <WorkingSteps working={p.working}/>
              </div>
              <div style={{background:"rgba(57,255,20,0.05)",border:`1px solid ${G}22`,borderRadius:10,padding:"10px 12px",marginBottom:12}}>
                <div style={{fontSize:9,letterSpacing:2,color:G,marginBottom:6,textTransform:"uppercase"}}>Final Answer</div>
                <div style={{fontSize:15}}><MathText text={p.answer} color="#8aca8a"/></div>
              </div>
              {marks[i]===undefined?(
                <div>
                  <div style={{color:"#444",fontSize:11,marginBottom:8}}>Your marks?</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {[...Array(p.marks+1)].map((_,m)=>(
                      <button key={m} onClick={()=>mark(i,m)} className="btn" style={{padding:"7px 16px",background:"#151515",border:"1px solid #2a2a2a",borderRadius:8,color:"#777",fontSize:13}}>{m}/{p.marks}</button>
                    ))}
                  </div>
                </div>
              ):(
                <div style={{fontSize:12,color:G,fontFamily:"monospace"}}>✓ {marks[i]}/{p.marks}</div>
              )}
            </div>
          )}
        </div>
      ))}

      {score&&(
        <div style={{background:`${sc(score.pct)}0d`,border:`1.5px solid ${sc(score.pct)}`,borderRadius:16,padding:"18px",marginBottom:14,animation:"fadeUp .3s ease"}}>
          <div style={{fontSize:10,letterSpacing:2,color:sc(score.pct),marginBottom:6,textTransform:"uppercase"}}>Score</div>
          <div style={{fontSize:40,fontWeight:900,color:"#fff",lineHeight:1,fontFamily:"monospace"}}>{score.got}/{score.tot}</div>
          <div style={{color:"#555",fontSize:13,marginTop:6}}>{score.pct}% · {score.pct>=70?"Excellent! 🎉":score.pct>=40?"Good effort 📖":"Keep studying 💪"}</div>
        </div>
      )}

      {data.tip&&(
        <div style={{background:"rgba(240,165,0,0.06)",border:"1px solid rgba(240,165,0,0.15)",borderRadius:12,padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:9,letterSpacing:2,color:"#f0a500",marginBottom:4,textTransform:"uppercase"}}>💡 Tip</div>
          <div style={{color:"#8a7040",fontSize:13}}>{data.tip}</div>
        </div>
      )}

      <GreenBtn onClick={load}>Next Question →</GreenBtn>
    </div>
  );
}

// ── TUTOR ─────────────────────────────────────────────────────────────────────
function Tutor({subject,topic,color,name}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:`Hey ${name}! 👋 Ready to crush ${topic}? Ask me anything!`}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bot=useRef();

  useEffect(()=>{bot.current?.scrollIntoView({behavior:"smooth"})},[msgs,loading]);

  const send=async()=>{
    const t=input.trim();
    if(!t||loading) return;
    const nm=[...msgs,{role:"user",content:t}];
    setMsgs(nm);setInput("");setLoading(true);
    try{const r=await chatTutor(nm,subject,topic);setMsgs(m=>[...m,{role:"assistant",content:r}]);}
    catch{setMsgs(m=>[...m,{role:"assistant",content:"Connection error. Try again!"}]);}
    setLoading(false);
  };

  const quick=["Explain simply","Worked example","Common mistakes","How examined?"];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:10,maxHeight:"48vh"}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",animation:"fadeUp .2s ease"}}>
            <div style={{maxWidth:"82%",background:m.role==="user"?`linear-gradient(135deg,${G},#00cc00)`:"#111",border:m.role==="user"?"none":"1px solid #1e1e1e",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"11px 15px",color:m.role==="user"?"#000":"#ccc",fontSize:14,lineHeight:1.6,fontWeight:m.role==="user"?600:400}}>
              {m.content}
            </div>
          </div>
        ))}
        {loading&&<div style={{paddingLeft:4}}><Dot/></div>}
        <div ref={bot}/>
      </div>

      {msgs.length===1&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10,marginTop:6}}>
          {quick.map(q=>(
            <button key={q} onClick={()=>setInput(`${q} ${topic}`)} className="btn" style={{padding:"6px 12px",background:"#111",border:`1px solid ${G}22`,borderRadius:100,color:"#666",fontSize:12}}>{q}</button>
          ))}
        </div>
      )}

      <div style={{display:"flex",gap:8,background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:"4px 4px 4px 14px",marginTop:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Ask anything..." style={{flex:1,background:"transparent",border:"none",padding:"10px 0",fontSize:14,color:"#fff",borderRadius:0}}/>
        <button onClick={send} disabled={loading||!input.trim()} className="btn" style={{padding:"10px 16px",background:loading||!input.trim()?"#151515":G,border:"none",borderRadius:10,color:loading||!input.trim()?"#333":"#000",fontWeight:900,fontSize:16,transition:"all .2s"}}>↑</button>
      </div>
    </div>
  );
}

// ── TEACHER ───────────────────────────────────────────────────────────────────
function Teacher({onLogout}){

  VALID_CODES.forEach(code=>{(db.get(`r_${code}`)||[]).forEach(r=>all.push({...r,code}))});

  const topicMap={};
  all.forEach(r=>{const k=`${r.subject}|||${r.topic}`;if(!topicMap[k])topicMap[k]={subject:r.subject,topic:r.topic,scores:[],attempts:0};topicMap[k].scores.push(r.pct);topicMap[k].attempts++;});
  const topics=Object.values(topicMap).map(t=>({...t,avg:Math.round(t.scores.reduce((a,b)=>a+b,0)/t.scores.length)})).sort((a,b)=>a.avg-b.avg);
  const struggling=topics.filter(t=>t.avg<60);

  const stuMap={};
  all.forEach(r=>{const n=r.studentName||r.code;if(!stuMap[n])stuMap[n]={name:n,code:r.code,results:[]};stuMap[n].results.push(r);});
  const students=Object.values(stuMap).map(s=>({...s,avg:Math.round(s.results.reduce((a,r)=>a+r.pct,0)/s.results.length),attempts:s.results.length,weak:[...new Map(s.results.filter(r=>r.pct<50).map(r=>[r.topic,r])).values()]})).sort((a,b)=>a.avg-b.avg);
  const overall=all.length>0?Math.round(all.reduce((a,r)=>a+r.pct,0)/all.length):null;

          {[{l:"Attempts",v:all.length,c:"#3b82f6"},{l:"Class Avg",v:overall!==null?`${overall}%`:"—",c:overall?sc(overall):"#333"},{l:"Students",v:students.length,c:"#a78bfa"}].map(s=>(
            <div key={s.l} style={{background:"#111",border:`1px solid ${s.c}22`,borderRadius:14,padding:"14px 10px",textAlign:"center"}}>

                    <div style={{fontSize:10,color:"#333",marginTop:1}}>{names.length>0?names.join(", "):"Unused"}</div>
                  </div>
                  <div style={{fontSize:11,color:cr.length>0?G:"#222",fontFamily:"monospace"}}>{cr.length}×</div>
                </div>);
              })}
            </div>
            <div style={{background:"#111",border:`1px solid ${G}22`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
              <div style={{fontSize:9,letterSpacing:3,color:"#333",marginBottom:6,textTransform:"uppercase"}}>Teacher Code</div>
              <div style={{fontFamily:"monospace",fontSize:20,color:G,fontWeight:900,letterSpacing:3}}>{TEACHER_CODE}</div>
            </div>
            <div style={{background:"#111",border:"1px solid #1a1a1a",borderRadius:14,padding:"14px 16px"}}>
              <div style={{fontSize:9,letterSpacing:3,color:"#333",marginBottom:6,textTransform:"uppercase"}}>App Link</div>
              <div style={{fontFamily:"monospace",fontSize:13,color:"#3b82f6"}}>bgcse-study.netlify.app</div>
              <div style={{fontSize:10,color:"#222",marginTop:4}}>© EduTee Tech · Botswana 🇧🇼</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [name,setName]=useState("");
  const [code,setCode]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const quote=useMemo(()=>QUOTES[Math.floor(Math.random()*QUOTES.length)],[]);

  const go=()=>{
    if(!name.trim()){setErr("Enter your name");return}
    if(!code.trim()){setErr("Enter your access code");return}
    setLoading(true);
    setTimeout(()=>{
      const c=code.trim().toUpperCase();
      if(c===TEACHER_CODE) onLogin({name:name.trim(),role:"teacher",code:c});
      else if(VALID_CODES.includes(c)) onLogin({name:name.trim(),role:"student",code:c});
      else{setErr("Invalid code. Contact your teacher.");setLoading(false);}
    },600);
  };

  return(
    <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,position:"relative",overflow:"hidden"}}>
      {/* Background glow */}
      <div style={{position:"absolute",top:"20%",left:"50%",transform:"translateX(-50%)",width:300,height:300,background:`radial-gradient(circle,${G}08 0%,transparent 70%)`,pointerEvents:"none"}}/>

      <div style={{width:"100%",maxWidth:360,animation:"fadeUp .5s ease",position:"relative"}}>
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:42,fontWeight:900,letterSpacing:-2,marginBottom:4}} className="glow-text">
            Edu<span style={{color:G}}>Tee</span>
          </div>
          <div style={{fontSize:12,color:"#333",letterSpacing:3,textTransform:"uppercase"}}>Tech · Botswana 🇧🇼</div>
        </div>

        {/* Quote */}
        <div style={{background:"#111",border:`1px solid ${G}18`,borderRadius:14,padding:"14px 16px",marginBottom:24}}>
          <div style={{fontSize:13,fontStyle:"italic",color:"#555",lineHeight:1.6}}>"{quote}"</div>
        </div>

        {/* Form */}
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
          <input value={name} onChange={e=>{setName(e.target.value);setErr("")}} placeholder="Your name" style={{background:"#111",border:`1.5px solid ${err&&!name?"#ff4444":"#1e1e1e"}`,borderRadius:12,color:"#fff",padding:"14px 16px",fontSize:14}}/>
          <input value={code} onChange={e=>{setCode(e.target.value);setErr("")}} placeholder="Access code" onKeyDown={e=>e.key==="Enter"&&go()} style={{background:"#111",border:`1.5px solid ${err&&!code?"#ff4444":"#1e1e1e"}`,borderRadius:12,color:G,padding:"14px 16px",fontSize:14,letterSpacing:3,fontFamily:"monospace",fontWeight:700}}/>
        </div>

        {err&&<div style={{color:"#ff4444",fontSize:12,textAlign:"center",marginBottom:12,animation:"fadeUp .2s ease"}}>{err}</div>}

        <GreenBtn full onClick={go} disabled={loading}>
          {loading?"Checking...":"Enter →"}
        </GreenBtn>

        <div style={{textAlign:"center",marginTop:20,color:"#222",fontSize:11,lineHeight:1.8}}>
          BGCSE Botswana Syllabus<br/>
          No code? Contact your teacher.
        </div>
      </div>
    </div>
  );
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [subject,setSubject]=useState(null);
  const [topic,setTopic]=useState(null);
  const [studyTab,setStudyTab]=useState("notes");
  const [screen,setScreen]=useState("home");
  const [bottomTab,setBottomTab]=useState("learn");
  const [search,setSearch]=useState("");
  const [menuOpen,setMenuOpen]=useState(false);
  const [darkMode,setDarkMode]=useState(true);

  const subj=SUBJECTS.find(s=>s.id===subject);

  const saveResult=(r)=>{
    const k=`r_${user.code}`;
    db.set(k,[...(db.get(k)||[]),{...r,studentName:user.name}]);
  };

  const isBookmarked=()=>{
    if(!topic||!subj||!user) return false;
    return (db.get(`bm_${user.code}`)||[]).some(b=>b.topic===topic&&b.subject===subj.label);
  };

  const toggleBookmark=()=>{
    if(!topic||!subj||!user) return;
    const k=`bm_${user.code}`;
    const bm=db.get(k)||[];
    const exists=bm.some(b=>b.topic===topic&&b.subject===subj.label);
    db.set(k,exists?bm.filter(b=>!(b.topic===topic&&b.subject===subj.label)):[...bm,{topic,subject:subj.label,subjectId:subj.id}]);
  };

  const goHome=()=>{setScreen("home");setSubject(null);setTopic(null);setBottomTab("learn")};

  if(!user) return <Login onLogin={setUser}/>;
  if(user.role==="teacher") return <Teacher onLogout={()=>setUser(null)}/>;

  const filtered=subj?.topics.filter(t=>t.toLowerCase().includes(search.toLowerCase()));
  const bookmarked=isBookmarked();
  const initials=user.name.split(" ").map(n=>n[0]).join("").toUpperCase().slice(0,2);

  return(
    <div style={{minHeight:"100vh",background:"#0a0a0a",color:"#fff",display:"flex",flexDirection:"column"}}>
      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
        @keyframes bounce{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-5px);opacity:1}}
        @keyframes glow{0%,100%{text-shadow:0 0 10px rgba(57,255,20,0.5)}50%{text-shadow:0 0 20px rgba(57,255,20,0.9)}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes menuSlide{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
        .btn:active{transform:scale(.95)!important}
        .tr{transition:all .15s}.tr:hover{opacity:.8}
        .card{transition:all .2s}.card:hover{transform:translateY(-2px)}
      `}</style>

      {/* MENU */}
      {menuOpen&&<Menu user={user} onClose={()=>setMenuOpen(false)} onLogout={()=>{setUser(null);setMenuOpen(false)}} onNav={(id)=>{setBottomTab(id);if(id==="learn")setScreen("home")}} darkMode={darkMode} setDarkMode={setDarkMode}/>}

      {/* HEADER */}
      <header style={{padding:"0 16px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #151515",background:"rgba(10,10,10,0.97)",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)"}}>
        <div style={{fontWeight:900,fontSize:17,cursor:"pointer",color:"#fff"}} onClick={goHome} className="glow-text">
          Edu<span style={{color:G}}>Tee</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {topic&&<div style={{fontSize:10,color:"#333",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{topic}</div>}
          <button onClick={()=>setMenuOpen(true)} className="btn" style={{width:36,height:36,borderRadius:10,background:"#111",border:"1px solid #1e1e1e",display:"flex",alignItems:"center",justifyContent:"center",color:G,fontWeight:900,fontSize:13,flexShrink:0}}>
            {initials}
          </button>
        </div>
      </header>

      {/* MAIN */}
      <main style={{flex:1,maxWidth:680,width:"100%",margin:"0 auto",padding:"18px 14px 90px",overflowY:"auto"}}>

        {/* HOME */}
        {screen==="home"&&bottomTab==="learn"&&(
          <div style={{animation:"fadeUp .4s ease"}}>
            <Countdown/>
            {/* Quote */}
            <div style={{background:"#111",border:`1px solid ${G}12`,borderRadius:14,padding:"12px 16px",marginBottom:16}}>
              <div style={{fontSize:13,fontStyle:"italic",color:"#444",lineHeight:1.5}}>"{QUOTES[new Date().getDay()%QUOTES.length]}"</div>
            </div>
            {/* Subjects */}
            <div style={{fontSize:10,letterSpacing:3,color:"#333",marginBottom:12,textTransform:"uppercase"}}>Choose Subject</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
              {SUBJECTS.map((s,i)=>(
                <div key={s.id} className="card btn" onClick={()=>{setSubject(s.id);setScreen("topics");setSearch("")}} style={{background:"#111",border:`1.5px solid ${s.color}22`,borderRadius:16,padding:"18px 14px",cursor:"pointer",animation:`fadeUp .4s ease ${i*.08}s both`,position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:-20,right:-20,fontSize:60,opacity:.05}}>{s.icon}</div>
                  <div style={{fontSize:28,marginBottom:10}}>{s.icon}</div>
                  <div style={{fontWeight:800,fontSize:14,color:"#fff",marginBottom:4}}>{s.label}</div>
                  <div style={{fontSize:10,color:s.color,fontFamily:"monospace"}}>{s.topics.length} topics</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* BOOKMARKS */}
        {bottomTab==="bookmarks"&&<Bookmarks userCode={user.code} onSelect={(b)=>{setSubject(b.subjectId);setTopic(b.topic);setStudyTab("notes");setScreen("learn");setBottomTab("learn")}}/>}

        {/* FORMULAS */}
        {bottomTab==="formulas"&&<FormulaSheet/>}

        {/* RESULTS */}
        {bottomTab==="results"&&<Results user={user}/>}

        {/* WORKSHEET */}
        {bottomTab==="worksheet"&&<WorksheetSolver/>}

        {/* ORGANIC VIDEOS */}
        {bottomTab==="videos"&&<OrgChemVideos/>}

        {/* STUDY TIME */}
        {bottomTab==="studytime"&&<StudyTimeView userCode={user.code}/>}

        {/* OFFLINE NOTES */}
        {bottomTab==="offline"&&<OfflineNotesView userCode={user.code} onSelect={(item)=>{setSubject(SUBJECTS.find(s=>s.label===item.subject)?.id);setTopic(item.topic);setStudyTab("notes");setScreen("learn");setBottomTab("learn");}}/>}

        {/* TOPICS */}
        {screen==="topics"&&subj&&bottomTab==="learn"&&(
          <div style={{animation:"fadeUp .35s ease"}}>
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:18}}>
              <button onClick={()=>setScreen("home")} className="btn" style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",color:"#555",fontSize:18,flexShrink:0}}>←</button>
              <div>
                <div style={{fontSize:20,fontWeight:900,color:"#fff"}}>{subj.label}</div>
                <div style={{fontSize:10,color:"#333",fontFamily:"monospace"}}>{subj.topics.length} topics</div>
              </div>
            </div>
            <div style={{position:"relative",marginBottom:14}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,color:"#fff",padding:"11px 14px 11px 38px",fontSize:14}}/>
              <div style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#333",fontSize:14}}>⌕</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {filtered?.map((t,i)=>(
                <button key={t} className="tr btn" onClick={()=>{setTopic(t);setStudyTab("notes");setScreen("learn");StudyTimer.start(user.code,subj.label);}} style={{background:"#111",border:"1px solid #161616",borderRadius:11,padding:"13px 14px",textAlign:"left",color:"#aaa",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:"'Segoe UI',sans-serif",animation:`fadeUp .25s ease ${Math.min(i,8)*.03}s both`}}>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:10,color:"#222",minWidth:18,fontFamily:"monospace"}}>{String(i+1).padStart(2,"0")}</span>
                    {t}
                  </div>
                  <span style={{color:subj.color,fontSize:14,flexShrink:0}}>→</span>
                </button>
              ))}
              {filtered?.length===0&&<div style={{textAlign:"center",padding:40,color:"#333",fontSize:12}}>No match for "{search}"</div>}
            </div>
          </div>
        )}

        {/* LEARN */}
        {screen==="learn"&&subj&&topic&&bottomTab==="learn"&&(
          <div style={{animation:"slideRight .35s ease"}}>
            {/* Topic header */}
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}>
              <button onClick={()=>{setScreen("topics");StudyTimer.stop(user.code);}} className="btn" style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",color:"#555",fontSize:18,flexShrink:0}}>←</button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:10,color:subj.color,textTransform:"uppercase",letterSpacing:2,marginBottom:2}}>{subj.label}</div>
                <div style={{fontSize:15,fontWeight:900,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{topic}</div>
              </div>
              {/* Bookmark */}
              <button onClick={toggleBookmark} className="btn" style={{background:bookmarked?`${subj.color}18`:"#111",border:`1.5px solid ${bookmarked?subj.color:"#1e1e1e"}`,borderRadius:10,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>
                🔖
              </button>
              {/* Offline save */}
              <button onClick={async()=>{
                if(!offlineNotes){
                  const n=await getNotes(subj.label,topic).catch(()=>null);
                  if(n){Offline.save(user.code,subj.label,topic,n);setOfflineNotes(true);}
                }
              }} className="btn" style={{background:offlineNotes?`${G}18`:"#111",border:`1.5px solid ${offlineNotes?G:"#1e1e1e"}`,borderRadius:10,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,title:"Save offline"}}>
                📥
              </button>
            </div>

            {/* Tabs */}
            <div style={{display:"flex",gap:4,marginBottom:18,background:"#111",borderRadius:12,padding:4}}>
              {[["notes","📘 Notes"],["exam","📝 Exam"],["tutor","🤖 Tutor"]].map(([id,lbl])=>(
                <button key={id} onClick={()=>setStudyTab(id)} className="btn" style={{flex:1,padding:"9px 4px",borderRadius:9,background:studyTab===id?subj.color:"transparent",color:studyTab===id?"#000":"#444",fontSize:12,fontWeight:studyTab===id?800:400,transition:"all .2s",boxShadow:studyTab===id?"0 2px 10px rgba(0,0,0,0.3)":"none"}}>
                  {lbl}
                </button>
              ))}
            </div>

            {studyTab==="notes"&&<Notes subject={subj.label} topic={topic} color={subj.color}/>}
            {studyTab==="exam"&&<Exam subject={subj.label} topic={topic} color={subj.color} user={user} onResult={saveResult}/>}
            {studyTab==="tutor"&&<Tutor subject={subj.label} topic={topic} color={subj.color} name={user.name.split(" ")[0]}/>}
          </div>
        )}
      </main>

      {/* BOTTOM NAV */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(10,10,10,0.97)",borderTop:"1px solid #151515",padding:"6px 4px 10px",zIndex:100,backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",maxWidth:680,margin:"0 auto",gap:1,overflowX:"auto"}}>
          {[
            ["learn","📚","Study"],
            ["worksheet","🧮","Solver"],
            ["videos","🎥","Chem TV"],
            ["offline","📥","Offline"],
            ["studytime","⏱️","Time"],
            ["results","📊","Results"],
          ].map(([id,icon,lbl])=>{
            const active=bottomTab===id;
            return(
              <button key={id} onClick={()=>{setBottomTab(id);if(id==="learn"&&!topic)setScreen("home");}} className="btn" style={{flex:1,minWidth:48,padding:"7px 2px 4px",background:active?`${G}0d`:"none",border:active?`1px solid ${G}22`:"1px solid transparent",borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:active?G:"#333",transition:"all .2s"}}>
                <span style={{fontSize:16}}>{icon}</span>
                <span style={{fontSize:7,letterSpacing:.3,textTransform:"uppercase",fontFamily:"monospace",fontWeight:active?800:400,whiteSpace:"nowrap"}}>{lbl}</span>
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
