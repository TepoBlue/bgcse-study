<div id="root"></div>
<script type="text/babel">

// ── STORAGE ───────────────────────────────────────────────────────────────────
const store = {
  get:(k)=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function claude(prompt, system) {
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[{role:"user",content:prompt}]})
  });
  const d = await r.json();
  return d.content?.map(b=>b.text||"").join("")||"";
}

async function getNotes(subject,topic){
  const raw = await claude(
    `Write BGCSE Botswana study notes for "${topic}" in ${subject}. Return ONLY valid JSON: {"summary":"2-3 sentences","keyPoints":["p1","p2","p3","p4","p5"],"definitions":[{"term":"word","meaning":"def"}],"formula":"formula or null","rememberThis":"most important exam tip"}`,
    "You are a BGCSE teacher in Botswana. Align strictly to the Botswana BGCSE syllabus. Return ONLY raw JSON."
  );
  return JSON.parse(raw.replace(/```json|```/g,"").trim());
}

async function getExam(subject,topic){
  const raw = await claude(
    `Create a BGCSE Botswana exam question for "${topic}" in ${subject}. Return ONLY valid JSON: {"question":"full question","marks":4,"parts":[{"part":"(a)","question":"sub q","marks":2,"answer":"model answer","working":"step by step"},{"part":"(b)","question":"sub q","marks":2,"answer":"model answer","working":"step by step"}],"examinerNote":"tip"}`,
    "You are a BGCSE examiner in Botswana. Return ONLY raw JSON."
  );
  return JSON.parse(raw.replace(/```json|```/g,"").trim());
}

async function tutor(msgs,subject,topic){
  return claude(
    msgs.map(m=>m.role+": "+m.content).join("\n"),
    `You are an expert BGCSE tutor in Botswana for ${subject}, topic "${topic}". Be encouraging and clear. Use step-by-step explanations aligned to the Botswana BGCSE syllabus. Plain text only.`
  );
}

// ── SPINNER ───────────────────────────────────────────────────────────────────
const Spin = ()=>(
  <div style={{display:"flex",flexDirection:"column",gap:16,padding:"20px 0"}}>
    {[90,70,80,60].map((w,i)=>(
      <div key={i} style={{height:14,width:w+"%",borderRadius:4,background:"rgba(255,255,255,0.06)",animation:"spin 1.4s linear infinite",opacity:.6}}/>
    ))}
  </div>
);

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [name,setName]=useState("");
  const [code,setCode]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const go=()=>{
    if(!name.trim()){setErr("Please enter your name");return}
    if(!code.trim()){setErr("Please enter your access code");return}
    setLoading(true);
    setTimeout(()=>{
      const c=code.trim().toUpperCase();
      if(c===TEACHER_CODE) onLogin({name:name.trim(),role:"teacher",code:c});
      else if(VALID_CODES.includes(c)) onLogin({name:name.trim(),role:"student",code:c});
      else{setErr("Invalid code. Contact your teacher.");setLoading(false);}
    },500);
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:380,animation:"fadeIn .4s ease"}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:32,fontWeight:800,color:"#e0e8ff",letterSpacing:-1,marginBottom:6}}>
            BGCSE<span style={{color:"#3b82f6"}}>.</span>study
          </div>
          <div style={{color:"#3a4a6a",fontSize:13}}>Botswana BGCSE Study Platform</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <div style={{fontSize:10,letterSpacing:3,color:"#3a4a6a",marginBottom:8,textTransform:"uppercase"}}>Your Name</div>
            <input value={name} onChange={e=>{setName(e.target.value);setErr("")}} placeholder="e.g. Bofelo Mokoena"/>
          </div>
          <div>
            <div style={{fontSize:10,letterSpacing:3,color:"#3a4a6a",marginBottom:8,textTransform:"uppercase"}}>Access Code</div>
            <input value={code} onChange={e=>{setCode(e.target.value);setErr("")}} placeholder="Given by your teacher" onKeyDown={e=>e.key==="Enter"&&go()} style={{letterSpacing:3,border:`1.5px solid ${err?"#ff5c8d":"rgba(255,255,255,0.08)"}`}}/>
          </div>
          {err&&<div style={{color:"#ff5c8d",fontSize:13,textAlign:"center"}}>{err}</div>}
          <button onClick={go} disabled={loading} style={{padding:14,background:loading?"#1a2535":"#3b82f6",border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:15,marginTop:4,transition:"background .2s"}}>
            {loading?"Checking...":"Enter →"}
          </button>
        </div>
        <div style={{textAlign:"center",marginTop:28,color:"#2a3a5a",fontSize:12}}>
          🇧🇼 Aligned to the Botswana BGCSE Syllabus
        </div>
      </div>
    </div>
  );
}

// ── NOTES TAB ─────────────────────────────────────────────────────────────────
function Notes({subject,topic,color}){
  const [notes,setNotes]=useState(null);
  const [loading,setLoading]=useState(true);

  const load=async()=>{
    setLoading(true);setNotes(null);
    try{setNotes(await getNotes(subject,topic))}catch{}
    setLoading(false);
  };
  useEffect(()=>{load()},[topic]);

  if(loading) return <Spin/>;
  if(!notes) return <button onClick={load} style={{padding:"10px 24px",background:color,border:"none",borderRadius:8,color:"#fff",fontWeight:600,cursor:"pointer"}}>Retry</button>;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14,animation:"fadeIn .3s ease"}}>
      <div style={{background:`${color}0d`,border:`1.5px solid ${color}30`,borderRadius:12,padding:"16px 18px"}}>
        <div style={{fontSize:10,letterSpacing:3,color,marginBottom:8,textTransform:"uppercase"}}>Overview</div>
        <div style={{color:"#c0d0e8",fontSize:14,lineHeight:1.7}}>{notes.summary}</div>
      </div>

      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"16px 18px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#5a6a8a",marginBottom:12,textTransform:"uppercase"}}>Key Points</div>
        {notes.keyPoints?.map((p,i)=>(
          <div key={i} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
            <div style={{width:22,height:22,borderRadius:6,background:`${color}20`,border:`1px solid ${color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color,flexShrink:0,fontWeight:700}}>{i+1}</div>
            <div style={{color:"#b0c0d8",fontSize:14,lineHeight:1.6}}>{p}</div>
          </div>
        ))}
      </div>

      {notes.formula&&(
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"14px 18px",display:"flex",gap:14,alignItems:"center"}}>
          <div style={{fontSize:20,color:"#4a5a7a"}}>ƒ</div>
          <div>
            <div style={{fontSize:10,letterSpacing:3,color:"#3a4a6a",marginBottom:4,textTransform:"uppercase"}}>Formula</div>
            <div style={{fontFamily:"monospace",fontSize:15,color:"#a0c0e0"}}>{notes.formula}</div>
          </div>
        </div>
      )}

      {notes.definitions?.length>0&&(
        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"16px 18px"}}>
          <div style={{fontSize:10,letterSpacing:3,color:"#5a6a8a",marginBottom:12,textTransform:"uppercase"}}>Key Definitions</div>
          {notes.definitions.map((d,i)=>(
            <div key={i} style={{marginBottom:8,paddingBottom:8,borderBottom:i<notes.definitions.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
              <span style={{color,fontWeight:600,fontSize:13}}>{d.term}: </span>
              <span style={{color:"#8a9ab8",fontSize:13}}>{d.meaning}</span>
            </div>
          ))}
        </div>
      )}

      <div style={{background:"rgba(240,165,0,0.07)",border:"1px solid rgba(240,165,0,0.2)",borderRadius:12,padding:"14px 18px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#f0a500",marginBottom:6,textTransform:"uppercase"}}>⭐ Remember This</div>
        <div style={{color:"#c0a060",fontSize:13,lineHeight:1.6}}>{notes.rememberThis}</div>
      </div>

      <button onClick={load} style={{padding:"10px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:8,color:"#6a7a9a",fontSize:13}}>
        Regenerate Notes ↺
      </button>
    </div>
  );
}

// ── EXAM TAB ──────────────────────────────────────────────────────────────────
function Exam({subject,topic,color,user,onResult}){
  const [exam,setExam]=useState(null);
  const [loading,setLoading]=useState(true);
  const [revealed,setRevealed]=useState({});
  const [marks,setMarks]=useState({});
  const [score,setScore]=useState(null);

  const load=async()=>{
    setLoading(true);setExam(null);setRevealed({});setMarks({});setScore(null);
    try{setExam(await getExam(subject,topic))}catch{}
    setLoading(false);
  };
  useEffect(()=>{load()},[topic]);

  const markPart=(i,m)=>{
    const nm={...marks,[i]:m};
    setMarks(nm);
    if(exam?.parts&&Object.keys(nm).length===exam.parts.length){
      const total=exam.parts.reduce((s,p)=>s+p.marks,0);
      const got=Object.values(nm).reduce((a,b)=>a+b,0);
      const pct=Math.round((got/total)*100);
      setScore({got,total,pct});
      if(onResult) onResult({subject,topic,score:got,total,pct,date:new Date().toISOString(),studentName:user.name});
    }
  };

  const sc=p=>p>=70?"#4ade80":p>=40?"#f0a500":"#ff5c8d";

  if(loading) return <Spin/>;
  if(!exam) return <button onClick={load} style={{padding:"10px 24px",background:color,border:"none",borderRadius:8,color:"#fff",fontWeight:600,cursor:"pointer"}}>Retry</button>;

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#3a4a6a",textTransform:"uppercase"}}>Exam Question</div>
        <div style={{fontSize:11,color,background:`${color}18`,border:`1px solid ${color}44`,borderRadius:100,padding:"3px 10px"}}>[{exam.marks} marks]</div>
      </div>

      <div style={{background:`${color}0d`,border:`1.5px solid ${color}30`,borderRadius:12,padding:"16px 18px",marginBottom:18}}>
        <div style={{color:"#d0daea",fontSize:15,lineHeight:1.7}}>{exam.question}</div>
      </div>

      {exam.parts?.map((part,i)=>(
        <div key={i} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"16px 18px",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <div>
              <span style={{color,fontWeight:700,fontSize:13}}>{part.part} </span>
              <span style={{color:"#c0d0e8",fontSize:14}}>{part.question}</span>
            </div>
            <span style={{fontSize:11,color:"#3a4a6a",flexShrink:0,marginLeft:8}}>[{part.marks}m]</span>
          </div>

          {!revealed[i]?(
            <button onClick={()=>setRevealed(r=>({...r,[i]:true}))} style={{padding:"9px 18px",background:`${color}18`,border:`1px solid ${color}44`,borderRadius:8,color,fontSize:13}}>
              Show Answer & Working
            </button>
          ):(
            <div style={{animation:"fadeIn .3s ease"}}>
              <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"12px 14px",marginBottom:10}}>
                <div style={{fontSize:10,letterSpacing:2,color:"#3a4a6a",marginBottom:6,textTransform:"uppercase"}}>Step-by-Step Working</div>
                <div style={{fontFamily:"monospace",fontSize:12,color:"#7a9a8a",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{part.working}</div>
              </div>
              <div style={{background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:8,padding:"10px 14px",marginBottom:12}}>
                <div style={{fontSize:10,letterSpacing:2,color:"#4ade80",marginBottom:4,textTransform:"uppercase"}}>Model Answer</div>
                <div style={{color:"#90c090",fontSize:13,lineHeight:1.6}}>{part.answer}</div>
              </div>
              {marks[i]===undefined?(
                <div>
                  <div style={{color:"#5a6a8a",fontSize:12,marginBottom:8}}>How many marks did you score?</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {[...Array(part.marks+1)].map((_,m)=>(
                      <button key={m} onClick={()=>markPart(i,m)} style={{padding:"7px 16px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#8a9ab8",fontSize:13}}>
                        {m}/{part.marks}
                      </button>
                    ))}
                  </div>
                </div>
              ):(
                <div style={{fontSize:12,color:"#4ade80",fontFamily:"monospace"}}>✓ {marks[i]}/{part.marks} marks</div>
              )}
            </div>
          )}
        </div>
      ))}

      {score&&(
        <div style={{background:`${sc(score.pct)}18`,border:`1.5px solid ${sc(score.pct)}`,borderRadius:12,padding:"18px 20px",marginBottom:16,animation:"fadeIn .4s ease"}}>
          <div style={{fontSize:10,letterSpacing:2,color:sc(score.pct),marginBottom:6,textTransform:"uppercase"}}>Your Score</div>
          <div style={{fontSize:32,fontWeight:700,color:"#e0e8ff",marginBottom:4}}>{score.got}/{score.total}</div>
          <div style={{color:"#6a7a9a",fontSize:13}}>{score.pct}% · {score.pct>=70?"Excellent! 🎉":score.pct>=40?"Good effort — review the working 📖":"Keep practising! Study the notes first 💪"}</div>
        </div>
      )}

      {exam.examinerNote&&(
        <div style={{background:"rgba(240,165,0,0.07)",border:"1px solid rgba(240,165,0,0.2)",borderRadius:10,padding:"12px 16px",marginBottom:16}}>
          <div style={{fontSize:10,letterSpacing:2,color:"#f0a500",marginBottom:4,textTransform:"uppercase"}}>💡 Examiner Note</div>
          <div style={{color:"#b09050",fontSize:13,lineHeight:1.6}}>{exam.examinerNote}</div>
        </div>
      )}

      <button onClick={load} style={{padding:"12px 28px",background:color,border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:14}}>
        New Question →
      </button>
    </div>
  );
}

// ── TUTOR TAB ─────────────────────────────────────────────────────────────────
function Tutor({subject,topic,color,name}){
  const [msgs,setMsgs]=useState([{role:"assistant",content:`Hi ${name}! 👋 I'm your BGCSE AI tutor for ${subject} — "${topic}". Ask me anything and I'll explain it step by step!`}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottom=useRef();

  useEffect(()=>{bottom.current?.scrollIntoView({behavior:"smooth"})},[msgs]);

  const send=async()=>{
    const t=input.trim();
    if(!t||loading) return;
    const nm=[...msgs,{role:"user",content:t}];
    setMsgs(nm);setInput("");setLoading(true);
    try{
      const r=await tutor(nm,subject,topic);
      setMsgs(m=>[...m,{role:"assistant",content:r}]);
    }catch{
      setMsgs(m=>[...m,{role:"assistant",content:"Sorry, connection error. Please try again!"}]);
    }
    setLoading(false);
  };

  const quick=[`Explain ${topic} simply`,"Give me a worked example","What are common exam mistakes?","How is this tested in BGCSE?"];

  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:400}}>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:12,paddingBottom:12,maxHeight:"50vh"}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"85%",background:m.role==="user"?`linear-gradient(135deg,${color},${color}aa)`:"rgba(255,255,255,0.05)",border:m.role==="user"?"none":"1px solid rgba(255,255,255,0.08)",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"12px 16px",color:m.role==="user"?"#fff":"#c0d0e8",fontSize:14,lineHeight:1.65}}>
              {m.content}
            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",gap:5,padding:"10px 14px",background:"rgba(255,255,255,0.04)",borderRadius:"16px 16px 16px 4px",width:"fit-content"}}>
            {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:color,animation:`bounce 1s ${i*.15}s infinite`}}/>)}
          </div>
        )}
        <div ref={bottom}/>
      </div>

      {msgs.length===1&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12,marginTop:8}}>
          {quick.map(p=>(
            <button key={p} onClick={()=>setInput(p)} style={{padding:"7px 12px",background:"rgba(255,255,255,0.04)",border:`1px solid ${color}33`,borderRadius:100,color:"#6a7a9a",fontSize:12}}>
              {p}
            </button>
          ))}
        </div>
      )}

      <div style={{display:"flex",gap:8,background:"rgba(255,255,255,0.04)",border:"1.5px solid rgba(255,255,255,0.09)",borderRadius:12,padding:"4px 4px 4px 14px",marginTop:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Ask your tutor anything..." style={{flex:1,background:"transparent",border:"none",padding:"10px 0",fontSize:14,borderRadius:0}}/>
        <button onClick={send} disabled={loading||!input.trim()} style={{padding:"10px 18px",background:loading||!input.trim()?"#1a2535":color,border:"none",borderRadius:10,color:"#fff",fontWeight:700,fontSize:16,transition:"background .2s"}}>↑</button>
      </div>
    </div>
  );
}

// ── RESULTS VIEW ──────────────────────────────────────────────────────────────
function Results({user}){
  const results=store.get(`r_${user.code}`)||[];
  const overall=results.length>0?Math.round(results.reduce((a,r)=>a+r.pct,0)/results.length):null;
  const sc=p=>p>=70?"#4ade80":p>=40?"#f0a500":"#ff5c8d";

  if(results.length===0) return(
    <div style={{textAlign:"center",padding:"60px 20px",color:"#3a4a6a"}}>
      <div style={{fontSize:40,marginBottom:12}}>📊</div>
      <div style={{fontSize:13}}>No results yet. Complete exam questions to track your progress!</div>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16,animation:"fadeIn .3s ease",paddingBottom:60}}>
      <div style={{background:"rgba(59,130,246,0.08)",border:"1.5px solid rgba(59,130,246,0.2)",borderRadius:14,padding:20,textAlign:"center"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#3b82f6",marginBottom:6,textTransform:"uppercase"}}>Overall Average</div>
        <div style={{fontSize:48,fontWeight:700,color:"#e0e8ff",lineHeight:1}}>{overall}%</div>
        <div style={{color:"#4a5a7a",fontSize:13,marginTop:4}}>{results.length} questions answered</div>
      </div>

      {SUBJECTS.map(s=>{
        const sr=results.filter(r=>r.subject===s.label);
        if(sr.length===0) return null;
        const avg=Math.round(sr.reduce((a,r)=>a+r.pct,0)/sr.length);
        return(
          <div key={s.id} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${s.color}22`,borderRadius:12,padding:"16px 18px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontSize:18}}>{s.icon}</span>
                <span style={{fontWeight:600,color:"#c0d0e8",fontSize:15}}>{s.label}</span>
              </div>
              <div style={{fontFamily:"monospace",fontSize:14,fontWeight:700,color:sc(avg)}}>{avg}%</div>
            </div>
            <div style={{height:5,background:"rgba(255,255,255,0.05)",borderRadius:3,overflow:"hidden",marginBottom:10}}>
              <div style={{height:"100%",width:`${avg}%`,background:sc(avg),borderRadius:3,transition:"width .6s ease"}}/>
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {sr.slice(-8).map((r,i)=>(
                <div key={i} title={`${r.topic}: ${r.pct}%`} style={{width:28,height:28,borderRadius:6,background:`${sc(r.pct)}18`,border:`1px solid ${sc(r.pct)}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:sc(r.pct),fontFamily:"monospace"}}>
                  {r.pct}
                </div>
              ))}
            </div>
          </div>
        );
      })}

      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:"16px 18px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#3a4a6a",marginBottom:12,textTransform:"uppercase"}}>Recent Activity</div>
        {results.slice(-6).reverse().map((r,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<5?"1px solid rgba(255,255,255,0.04)":"none"}}>
            <div>
              <div style={{color:"#8a9ab8",fontSize:13}}>{r.topic}</div>
              <div style={{color:"#3a4a6a",fontSize:11,fontFamily:"monospace"}}>{r.subject} · {new Date(r.date).toLocaleDateString()}</div>
            </div>
            <div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:sc(r.pct)}}>{r.pct}%</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── TEACHER DASHBOARD ─────────────────────────────────────────────────────────
function Teacher({onLogout}){
  const [tab,setTab]=useState("topics");
  const all=[];
  VALID_CODES.forEach(code=>{
    const r=store.get(`r_${code}`)||[];
    r.forEach(res=>all.push({...res,code}));
  });

  const topicMap={};
  all.forEach(r=>{
    const k=`${r.subject}|||${r.topic}`;
    if(!topicMap[k]) topicMap[k]={subject:r.subject,topic:r.topic,scores:[],attempts:0};
    topicMap[k].scores.push(r.pct);
    topicMap[k].attempts++;
  });
  const topics=Object.values(topicMap).map(t=>({...t,avg:Math.round(t.scores.reduce((a,b)=>a+b,0)/t.scores.length)})).sort((a,b)=>a.avg-b.avg);
  const struggling=topics.filter(t=>t.avg<60);

  const stuMap={};
  all.forEach(r=>{
    const n=r.studentName||r.code;
    if(!stuMap[n]) stuMap[n]={name:n,code:r.code,results:[]};
    stuMap[n].results.push(r);
  });
  const students=Object.values(stuMap).map(s=>({...s,avg:Math.round(s.results.reduce((a,r)=>a+r.pct,0)/s.results.length),attempts:s.results.length,weak:[...new Map(s.results.filter(r=>r.pct<50).map(r=>[r.topic,r])).values()]})).sort((a,b)=>a.avg-b.avg);

  const overall=all.length>0?Math.round(all.reduce((a,r)=>a+r.pct,0)/all.length):null;
  const sc=p=>p>=70?"#4ade80":p>=40?"#f0a500":"#ff5c8d";

  return(
    <div style={{minHeight:"100vh"}}>
      <header style={{padding:"0 16px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(8,13,22,0.97)",position:"sticky",top:0,zIndex:100}}>
        <div style={{fontWeight:800,fontSize:15}}>BGCSE<span style={{color:"#3b82f6"}}>.</span>study <span style={{color:"#3a4a6a",fontSize:11}}>/ Teacher</span></div>
        <button onClick={onLogout} style={{background:"none",border:"1px solid rgba(255,255,255,0.08)",borderRadius:6,padding:"5px 12px",color:"#5a6a8a",fontSize:12}}>Logout</button>
      </header>

      <div style={{maxWidth:680,margin:"0 auto",padding:"20px 16px 60px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
          {[{l:"Attempts",v:all.length,c:"#3b82f6"},{l:"Class Avg",v:overall!==null?`${overall}%`:"—",c:overall?sc(overall):"#3a4a6a"},{l:"Students",v:students.length,c:"#a78bfa"}].map(s=>(
            <div key={s.l} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${s.c}22`,borderRadius:12,padding:"14px 12px"}}>
              <div style={{fontSize:9,letterSpacing:3,color:"#3a4a6a",marginBottom:6,textTransform:"uppercase"}}>{s.l}</div>
              <div style={{fontSize:24,fontWeight:700,color:s.c}}>{s.v}</div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:4,marginBottom:20,background:"rgba(255,255,255,0.03)",borderRadius:10,padding:4}}>
          {[["topics","🔴 Struggling"],["students","👤 Students"],["codes","🔑 Codes"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"9px 4px",border:"none",borderRadius:8,background:tab===id?"#3b82f6":"transparent",color:tab===id?"#fff":"#5a6a8a",fontSize:12,fontWeight:tab===id?700:400,transition:"all .2s"}}>
              {lbl}
            </button>
          ))}
        </div>

        {all.length===0&&(
          <div style={{textAlign:"center",padding:"60px 20px",color:"#3a4a6a"}}>
            <div style={{fontSize:40,marginBottom:12}}>📊</div>
            <div style={{fontSize:13}}>No student data yet. Share codes with students to see results here.</div>
          </div>
        )}

        {tab==="topics"&&all.length>0&&(
          <div style={{animation:"fadeIn .35s ease"}}>
            {struggling.length>0&&(
              <div style={{background:"rgba(255,92,141,0.07)",border:"1.5px solid rgba(255,92,141,0.2)",borderRadius:14,padding:"16px 18px",marginBottom:18}}>
                <div style={{fontSize:10,letterSpacing:3,color:"#ff5c8d",marginBottom:12,textTransform:"uppercase"}}>⚠ Needs Attention ({struggling.length} topics)</div>
                {struggling.map((t,i)=>{
                  const s=SUBJECTS.find(s=>s.label===t.subject);
                  return(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                      <div style={{width:32,height:32,borderRadius:8,background:"rgba(255,92,141,0.12)",border:"1px solid rgba(255,92,141,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{s?.icon}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{color:"#d0a0a8",fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.topic}</div>
                        <div style={{fontSize:10,color:"#4a3a45",fontFamily:"monospace"}}>{t.subject} · {t.attempts} attempt{t.attempts!==1?"s":""}</div>
                      </div>
                      <div style={{fontFamily:"monospace",fontSize:15,fontWeight:700,color:"#ff5c8d",flexShrink:0}}>{t.avg}%</div>
                    </div>
                  );
                })}
              </div>
            )}

            <div style={{fontSize:10,letterSpacing:3,color:"#3a4a6a",marginBottom:12,textTransform:"uppercase"}}>All Topics (Worst → Best)</div>
            {topics.map((t,i)=>{
              const s=SUBJECTS.find(s=>s.label===t.subject);
              const c=sc(t.avg);
              return(
                <div key={i} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${c}18`,borderRadius:10,padding:"11px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                  <div style={{fontSize:10,color:"#2a3a55",minWidth:22,fontFamily:"monospace"}}>{String(i+1).padStart(2,"0")}</div>
                  <div style={{fontSize:16}}>{s?.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,color:"#b0c0d8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.topic}</div>
                    <div style={{fontSize:10,color:"#2a3a55",fontFamily:"monospace"}}>{t.attempts} attempt{t.attempts!==1?"s":""}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontFamily:"monospace",fontSize:14,fontWeight:700,color:c}}>{t.avg}%</div>
                    <div style={{width:50,height:3,background:"rgba(255,255,255,0.05)",borderRadius:2,overflow:"hidden",marginTop:3}}>
                      <div style={{height:"100%",width:`${t.avg}%`,background:c,borderRadius:2}}/>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {tab==="students"&&all.length>0&&(
          <div style={{animation:"fadeIn .35s ease",display:"flex",flexDirection:"column",gap:12}}>
            {students.map((s,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${sc(s.avg)}22`,borderRadius:14,padding:"16px 18px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:15,color:"#d0e0f0",marginBottom:2}}>{s.name}</div>
                    <div style={{fontSize:10,color:"#3a4a6a",fontFamily:"monospace"}}>Code: {s.code} · {s.attempts} question{s.attempts!==1?"s":""}</div>
                  </div>
                  <div style={{fontFamily:"monospace",fontSize:20,fontWeight:700,color:sc(s.avg)}}>{s.avg}%</div>
                </div>
                <div style={{height:5,background:"rgba(255,255,255,0.05)",borderRadius:3,overflow:"hidden",marginBottom:10}}>
                  <div style={{height:"100%",width:`${s.avg}%`,background:sc(s.avg),borderRadius:3}}/>
                </div>
                {s.weak.length>0&&(
                  <div style={{background:"rgba(255,92,141,0.06)",border:"1px solid rgba(255,92,141,0.15)",borderRadius:8,padding:"10px 12px"}}>
                    <div style={{fontSize:9,letterSpacing:2,color:"#ff5c8d",marginBottom:6,textTransform:"uppercase"}}>Needs Help With</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {s.weak.slice(0,5).map((r,j)=>(
                        <div key={j} style={{fontSize:11,color:"#c07080",background:"rgba(255,92,141,0.08)",borderRadius:6,padding:"3px 8px"}}>{r.topic}</div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {tab==="codes"&&(
          <div style={{animation:"fadeIn .35s ease"}}>
            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"18px 20px",marginBottom:14}}>
              <div style={{fontSize:10,letterSpacing:3,color:"#3a4a6a",marginBottom:14,textTransform:"uppercase"}}>Student Access Codes</div>
              {VALID_CODES.map((code,i)=>{
                const cr=store.get(`r_${code}`)||[];
                const names=[...new Set(cr.map(r=>r.studentName).filter(Boolean))];
                return(
                  <div key={code} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,marginBottom:8}}>
                    <div>
                      <div style={{fontFamily:"monospace",fontSize:14,color:"#3b82f6",fontWeight:700,letterSpacing:2}}>{code}</div>
                      <div style={{fontSize:11,color:"#3a4a6a",marginTop:2}}>{names.length>0?`Used by: ${names.join(", ")}`:"Not used yet"}</div>
                    </div>
                    <div style={{fontSize:11,color:cr.length>0?"#4ade80":"#2a3a55",fontFamily:"monospace"}}>{cr.length} attempts</div>
                  </div>
                );
              })}
            </div>
            <div style={{background:"rgba(59,130,246,0.07)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
              <div style={{fontSize:10,letterSpacing:3,color:"#3b82f6",marginBottom:6,textTransform:"uppercase"}}>Your Teacher Code</div>
              <div style={{fontFamily:"monospace",fontSize:18,color:"#3b82f6",fontWeight:700,letterSpacing:3,marginBottom:4}}>{TEACHER_CODE}</div>
              <div style={{color:"#3a4a6a",fontSize:12}}>Keep this private — only for you.</div>
            </div>
            <div style={{background:"rgba(240,165,0,0.06)",border:"1px solid rgba(240,165,0,0.15)",borderRadius:12,padding:"14px 16px"}}>
              <div style={{fontSize:10,letterSpacing:3,color:"#f0a500",marginBottom:6,textTransform:"uppercase"}}>App Link to Share</div>
              <div style={{fontFamily:"monospace",fontSize:14,color:"#60a5fa"}}>bgcse-study.netlify.app</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [subject,setSubject]=useState(null);
  const [topic,setTopic]=useState(null);
  const [tab,setTab]=useState("notes");
  const [screen,setScreen]=useState("home");
  const [search,setSearch]=useState("");
  const [bottomTab,setBottomTab]=useState("learn");

  const subj=SUBJECTS.find(s=>s.id===subject);

  const saveResult=(r)=>{
    const k=`r_${user.code}`;
    const existing=store.get(k)||[];
    store.set(k,[...existing,{...r,studentName:user.name}]);
  };

  if(!user) return <Login onLogin={setUser}/>;
  if(user.role==="teacher") return <Teacher onLogout={()=>setUser(null)}/>;

  const filteredTopics=subj?.topics.filter(t=>t.toLowerCase().includes(search.toLowerCase()));

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes bounce{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-4px);opacity:1}}.tr{transition:all .15s}.tr:hover{background:rgba(255,255,255,0.05)!important}`}</style>

      <header style={{padding:"0 16px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(8,13,22,0.97)",position:"sticky",top:0,zIndex:100}}>
        <div style={{fontWeight:800,fontSize:15,cursor:"pointer"}} onClick={()=>{setScreen("home");setSubject(null);setTopic(null);setBottomTab("learn")}}>
          BGCSE<span style={{color:"#3b82f6"}}>.</span>study
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {topic&&<div style={{fontSize:10,color:"#3a4a6a",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{topic}</div>}
          <button onClick={()=>setUser(null)} style={{background:"none",border:"1px solid rgba(255,255,255,0.07)",borderRadius:6,padding:"5px 10px",color:"#4a5a7a",fontSize:11}}>
            {user.name.split(" ")[0]}
          </button>
        </div>
      </header>

      <main style={{flex:1,maxWidth:680,width:"100%",margin:"0 auto",padding:"20px 16px 90px",overflowY:"auto"}}>

        {/* HOME */}
        {screen==="home"&&bottomTab==="learn"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{marginBottom:28}}>
              <div style={{fontSize:10,letterSpacing:4,color:"#3a4a6a",marginBottom:8,textTransform:"uppercase"}}>Welcome back</div>
              <div style={{fontSize:26,fontWeight:700,color:"#e0e8ff",marginBottom:4}}>{user.name}</div>
              <div style={{color:"#4a5a7a",fontSize:13}}>🇧🇼 Botswana BGCSE Syllabus — Choose a subject</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {SUBJECTS.map((s,i)=>(
                <div key={s.id} className="card" onClick={()=>{setSubject(s.id);setScreen("topics");setSearch("")}} style={{background:`linear-gradient(135deg,${s.color}14,rgba(8,13,22,0.8))`,border:`1.5px solid ${s.color}22`,borderRadius:14,padding:"20px 16px",cursor:"pointer",transition:"all .2s",animation:`fadeIn .4s ease ${i*.07}s both`}}>
                  <div style={{fontSize:24,marginBottom:8}}>{s.icon}</div>
                  <div style={{fontWeight:700,fontSize:15,color:"#e0e8ff",marginBottom:4}}>{s.label}</div>
                  <div style={{fontSize:10,color:s.color,fontFamily:"monospace"}}>{s.topics.length} topics</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:20,background:"rgba(59,130,246,0.06)",border:"1px solid rgba(59,130,246,0.15)",borderRadius:12,padding:"14px 16px"}}>
              <div style={{fontSize:10,letterSpacing:3,color:"#3b82f6",marginBottom:8,textTransform:"uppercase"}}>How to use</div>
              {["1. Pick a subject below","2. Choose a topic from the BGCSE syllabus","3. Read AI-generated study notes","4. Attempt an exam question with model answers","5. Chat with your AI tutor for help"].map(s=>(
                <div key={s} style={{color:"#4a5a7a",fontSize:13,marginBottom:4}}>{s}</div>
              ))}
            </div>
          </div>
        )}

        {/* MY RESULTS */}
        {bottomTab==="results"&&<Results user={user}/>}

        {/* TOPICS */}
        {screen==="topics"&&subj&&bottomTab==="learn"&&(
          <div style={{animation:"fadeIn .35s ease"}}>
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:20}}>
              <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:"#3a4a6a",fontSize:20,padding:4}}>←</button>
              <div>
                <div style={{fontSize:22,fontWeight:700,color:"#e0e8ff"}}>{subj.label}</div>
                <div style={{fontSize:10,color:"#3a4a6a",fontFamily:"monospace"}}>{subj.topics.length} BGCSE topics</div>
              </div>
            </div>
            <div style={{position:"relative",marginBottom:16}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search topics..." style={{paddingLeft:38}}/>
              <div style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#3a4a6a",fontSize:14}}>⌕</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {filteredTopics?.map((t,i)=>(
                <button key={t} className="tr" onClick={()=>{setTopic(t);setTab("notes");setScreen("learn")}} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:9,padding:"13px 16px",textAlign:"left",color:"#a0b0c8",fontSize:14,display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:"'Segoe UI',sans-serif",animation:`fadeIn .3s ease ${Math.min(i,6)*.03}s both`}}>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:10,color:"#2a3a55",minWidth:20,fontFamily:"monospace"}}>{String(i+1).padStart(2,"0")}</span>

                  </div>
                  <span style={{color:subj.color}}>→</span>
                </button>
              ))}
              {filteredTopics?.length===0&&(
                <div style={{textAlign:"center",padding:40,color:"#3a4a6a",fontSize:12,fontFamily:"monospace"}}>No topics match "{search}"</div>
              )}
            </div>
          </div>
        )}

        {/* LEARN */}
        {screen==="learn"&&subj&&topic&&bottomTab==="learn"&&(
          <div style={{animation:"fadeIn .3s ease"}}>
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16}}>
              <button onClick={()=>setScreen("topics")} style={{background:"none",border:"none",color:"#3a4a6a",fontSize:20,padding:4}}>←</button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:10,color:subj.color,textTransform:"uppercase",letterSpacing:2,marginBottom:2}}>{subj.label}</div>
                <div style={{fontSize:18,fontWeight:700,color:"#e0e8ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{topic}</div>
              </div>
            </div>

            <div style={{display:"flex",gap:4,marginBottom:20,background:"rgba(255,255,255,0.03)",borderRadius:10,padding:4}}>
              {[["notes","📘 Notes"],["exam","📝 Exam Q"],["tutor","🤖 Tutor"]].map(([id,lbl])=>(
                <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"9px 4px",border:"none",borderRadius:8,background:tab===id?subj.color:"transparent",color:tab===id?"#fff":"#5a6a8a",fontSize:12,fontWeight:tab===id?700:400,transition:"all .2s"}}>
                  {lbl}
                </button>
              ))}
            </div>

            {tab==="notes"&&<Notes subject={subj.label} topic={topic} color={subj.color}/>}
            {tab==="exam"&&<Exam subject={subj.label} topic={topic} color={subj.color} user={user} onResult={saveResult}/>}
            {tab==="tutor"&&<Tutor subject={subj.label} topic={topic} color={subj.color} name={user.name.split(" ")[0]}/>}
          </div>
        )}
      </main>

      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(8,13,22,0.97)",borderTop:"1px solid rgba(255,255,255,0.06)",padding:"8px 16px 12px",zIndex:100}}>
        <div style={{display:"flex",maxWidth:680,margin:"0 auto",gap:4}}>
          {[["learn","📚","Study"],["results","📊","My Results"]].map(([id,icon,lbl])=>(
            <button key={id} onClick={()=>{setBottomTab(id);if(id==="learn"&&!topic)setScreen("home")}} style={{flex:1,padding:"9px 4px 6px",background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:bottomTab===id?"#e0e8ff":"#3a4a6a",transition:"color .2s"}}>
              <span style={{fontSize:18}}>{icon}</span>
              <span style={{fontSize:9,letterSpacing:1,textTransform:"uppercase",fontFamily:"monospace"}}>{lbl}</span>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
